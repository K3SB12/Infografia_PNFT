<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNFT Infografía Lab – Asistente Completo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://unpkg.com/pptx2json@0.0.7/dist/pptx2json.min.js"></script>
    <style>
        :root {
            --turquesa: #09B7AE; --azul-oscuro: #014D6B; --azul-inst: #063B7F;
            --verde: #9ED16F; --gris-neutro: #C9C9C9; --gris-claro: #E8ECF1;
            --blanco: #FFFFFF; --gris-texto: #4A5568; --fondo: #F5F7FA;
            --sombra: 0 8px 32px rgba(0,0,0,0.08);
            --font: 'Poppins', system-ui, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font); background: var(--fondo);
            color: #1A1D23; min-height:100vh; display:flex; flex-direction:column;
        }
        header {
            background: var(--blanco); padding:0.8rem 1.5rem;
            display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:0.8rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position:sticky; top:0; z-index:100;
        }
        .logo { display:flex; align-items:center; gap:0.5rem; font-weight:700; color:var(--azul-oscuro); }
        .logo-icon {
            width:38px; height:38px; background:linear-gradient(135deg, var(--turquesa), var(--azul-inst));
            border-radius:10px; display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:800;
        }
        .btn {
            font-family:var(--font); font-weight:600; font-size:0.85rem;
            padding:0.5rem 1.2rem; border-radius:30px; border:none;
            cursor:pointer; transition:0.25s; display:inline-flex; align-items:center; gap:0.4rem;
            background:var(--turquesa); color:#fff; border:2px solid var(--turquesa);
        }
        .btn-outline { background:transparent; color:var(--turquesa); }
        .btn-outline:hover { background:var(--turquesa); color:#fff; }
        .btn:disabled { opacity:0.5; pointer-events:none; }
        .container {
            max-width:900px; margin:1.5rem auto; padding:0 1rem;
            display:flex; flex-direction:column; gap:1.2rem; flex:1;
        }
        .chat-panel {
            background:var(--blanco); border-radius:20px; padding:1.5rem;
            box-shadow:var(--sombra); display:flex; flex-direction:column; gap:1rem;
            max-height:60vh; overflow-y:auto;
        }
        .message { display:flex; gap:0.8rem; align-items:flex-start; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .avatar {
            width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
            justify-content:center; font-size:1rem; flex-shrink:0;
        }
        .assistant .avatar { background:var(--turquesa); color:#fff; }
        .user .avatar { background:var(--azul-inst); color:#fff; }
        .bubble {
            background:var(--fondo); padding:0.8rem 1.2rem; border-radius:18px;
            max-width:80%; font-size:0.9rem; line-height:1.5; color:#1A1D23;
            border:1px solid var(--gris-neutro);
        }
        .user .bubble { background:var(--turquesa); color:#fff; border-color:var(--turquesa); }
        .suggestion-card {
            background:var(--blanco); border:1px solid var(--gris-neutro);
            border-radius:12px; padding:0.8rem; margin:0.4rem 0;
            display:flex; align-items:center; justify-content:space-between; gap:0.8rem;
        }
        .input-area { display:flex; gap:0.6rem; margin-top:0.5rem; }
        textarea, input[type="text"] {
            font-family:var(--font); width:100%; padding:0.7rem 1rem;
            border-radius:14px; border:1.5px solid var(--gris-neutro);
            font-size:0.9rem; background:var(--blanco); resize:none;
        }
        textarea:focus, input:focus { border-color:var(--turquesa); outline:none; box-shadow:0 0 0 3px rgba(9,183,174,0.1); }
        .progress-steps { display:flex; gap:0.3rem; flex-wrap:wrap; margin:0.5rem 0; }
        .step-dot {
            width:28px; height:28px; border-radius:50%; background:var(--gris-claro);
            display:flex; align-items:center; justify-content:center;
            font-size:0.65rem; font-weight:700; color:var(--gris-texto);
        }
        .step-dot.completed { background:var(--verde); color:#fff; }
        .step-dot.active { background:var(--turquesa); color:#fff; }
        .toast {
            position:fixed; bottom:2rem; right:2rem; background:var(--azul-inst);
            color:#fff; padding:0.8rem 1.5rem; border-radius:30px; font-weight:600;
            z-index:999; opacity:0; transition:0.3s;
        }
        .toast.show { opacity:1; }
        .mode-selector {
            display:flex; gap:0.5rem; background:var(--gris-claro); padding:0.3rem; border-radius:30px;
        }
        .mode-option {
            padding:0.4rem 1rem; border-radius:30px; font-weight:600; font-size:0.8rem;
            cursor:pointer; transition:0.25s;
        }
        .mode-option.active { background:var(--blanco); box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        @media (max-width:600px) {
            .bubble { max-width:90%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">PNFT</div>
            <span>Infografía Lab</span>
        </div>
        <div style="display:flex; gap:0.8rem; align-items:center; flex-wrap:wrap;">
            <div class="mode-selector" id="modeSelector">
                <span class="mode-option active" data-mode="gemini">🧠 Gemini</span>
                <span class="mode-option" data-mode="chatgpt">📋 ChatGPT</span>
            </div>
            <button class="btn btn-outline btn-sm" id="btnApiKey">🔑 Clave</button>
            <button class="btn btn-sm" id="btnReset" style="background:transparent;color:var(--gris-texto);">↺</button>
        </div>
    </header>

    <div class="container">
        <div class="progress-steps" id="stepIndicator"></div>
        <div class="chat-panel" id="chatPanel"></div>
        <div class="input-area" id="inputArea">
            <textarea id="userInput" rows="2" placeholder="Escribe aquí..."></textarea>
            <button class="btn" id="btnSend">➤</button>
        </div>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
            <button class="btn btn-outline btn-sm" id="btnUploadFile">📂 Cargar archivo</button>
            <button class="btn btn-outline btn-sm" id="btnSkipStep" style="display:none;">⏭️ Saltar</button>
            <button class="btn btn-outline btn-sm" id="btnAnalyze" style="display:none;">🤖 Analizar con IA</button>
        </div>
        <input type="file" id="fileInput" accept=".docx,.pdf,.pptx,.txt" style="display:none;">
    </div>

    <div id="modalApi" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;">
        <div style="background:#fff;padding:2rem;border-radius:20px;max-width:400px;width:90%;">
            <h3>🔑 Clave de API</h3>
            <p style="font-size:0.85rem;">Gemini (gratis): <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a></p>
            <input type="password" id="apiKeyInput" placeholder="AIza...">
            <button class="btn" id="btnSaveApi">Guardar</button>
            <button class="btn btn-outline" id="btnCancelApi">Cancelar</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ========== ESTADO ==========
            const state = {
                mode: localStorage.getItem('pnft_mode') || 'gemini',       // 'gemini' o 'chatgpt'
                apiKey: localStorage.getItem('pnft_gemini_key') || '',
                step: 0,
                documentText: '',
                answers: {},
                analysisInProgress: false,   // ← evita bucles
            };

            // ========== ETAPAS (basadas en el prompt maestro) ==========
            const steps = [
                { field:'document', question:'📄 Pega o carga el documento curricular.', help:'Word, PDF, PowerPoint o texto directo.' },
                { field:'comprension', question:'🧩 ETAPA 1 – Comprensión: ¿Temas principales, secundarios, qué ver primero?', help:'Puedes analizar con IA o responder manualmente.' },
                { field:'jerarquia', question:'⚖️ ETAPA 2 – Pesos PNFT: ¿Qué aplicar (peso 5) y qué es contexto (peso 1)?', help:'Clasifica según criticidad pedagógica.' },
                { field:'arquitectura', question:'🏗️ ETAPA 3 – Arquitectura: ¿Tarjetas, columnas, línea de tiempo?', help:'Elige tipo de organización visual.' },
                { field:'wireframe', question:'🧱 ETAPA 4 – Wireframe: ¿Orden de lectura y flujo visual?', help:'Ej: izquierda→derecha, arriba→abajo.' },
                { field:'reticula_color', question:'📐 ETAPA 5 – Retícula + Color: ¿Estándar 12 columnas? ¿Colores especiales?', help:'Paleta PNFT: #09B7AE, #014D6B...' },
                { field:'sistema_visual', question:'🎨 ETAPA 6 – Estilo: Poppins, iconos 3D, ilustraciones juveniles.', help:'Confirma o ajusta el sistema visual.' },
                { field:'composicion', question:'🧱 ETAPA 6.2 – Composición: Espacios, equilibrio texto/imagen.', help:'Define distribución de tarjetas.' },
                { field:'densidad', question:'🧠 ETAPA 6.3 – Densidad: Máximo 3-5 ideas por bloque.', help:'Control de carga cognitiva.' },
                { field:'auditoria', question:'🧪 ETAPA 6.5 – Auditoría: ¿Cumple 16:9, Poppins, paleta, no infantil?', help:'Responde sí o indica ajustes.' },
                { field:'restricciones', question:'🚨 ETAPA 7 – Restricciones: No modificar, no resumir, no agregar.', help:'Confirma las reglas PNFT.' },
                { field:'json', question:'🧾 ETAPA 8 – JSON: ¿Quieres generar JSON estructurado?', help:'Responde sí o no.' },
            ];

            // ========== FUNCIONES ==========
            function saveState() {
                localStorage.setItem('pnft_mode', state.mode);
                localStorage.setItem('pnft_gemini_key', state.apiKey);
                localStorage.setItem('pnft_step', state.step);
                localStorage.setItem('pnft_document', state.documentText);
                localStorage.setItem('pnft_answers', JSON.stringify(state.answers));
            }

            function toast(msg) {
                const t = document.getElementById('toast');
                t.textContent = msg; t.className = 'toast show';
                clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
            }

            function updateUI() {
                document.getElementById('stepIndicator').innerHTML = steps.map((s,i) => {
                    let cls = 'step-dot';
                    if (i < state.step) cls += ' completed';
                    else if (i === state.step) cls += ' active';
                    return `<span class="${cls}" title="${s.question}">${i+1}</span>`;
                }).join('');
                const modeOptions = document.querySelectorAll('.mode-option');
                modeOptions.forEach(opt => {
                    opt.classList.toggle('active', opt.dataset.mode === state.mode);
                });
            }

            function addMessage(role, text, extraHTML = '') {
                const panel = document.getElementById('chatPanel');
                const div = document.createElement('div');
                div.className = `message ${role}`;
                div.innerHTML = `<div class="avatar">${role==='assistant'?'🤖':'👤'}</div><div class="bubble">${text.replace(/\n/g,'<br>')}${extraHTML}</div>`;
                panel.appendChild(div);
                panel.scrollTop = panel.scrollHeight;
            }

            function showStep(index) {
                if (index >= steps.length) {
                    addMessage('assistant','✅ ¡Etapas completas! Pulsa <strong>Generar Infografía</strong>.');
                    document.getElementById('btnSend').textContent = '🖼️ Generar Infografía';
                    document.getElementById('btnSend').dataset.action = 'generate';
                    document.getElementById('btnSkipStep').style.display = 'none';
                    document.getElementById('btnAnalyze').style.display = 'none';
                    return;
                }
                const step = steps[index];
                addMessage('assistant', `<strong>${step.question}</strong><br><span style="font-size:0.8rem;color:var(--gris-texto);">${step.help||''}</span>`);
                document.getElementById('btnSend').textContent = '➤';
                document.getElementById('btnSend').dataset.action = 'answer';
                document.getElementById('btnSkipStep').style.display = 'inline-flex';
                // Mostrar botón de análisis solo si hay documento y estamos en una etapa que pueda ser analizada
                const showAnalyze = (index > 0 && state.documentText && !state.analysisInProgress);
                document.getElementById('btnAnalyze').style.display = showAnalyze ? 'inline-flex' : 'none';
            }

            // Construir el prompt maestro completo
            function buildMasterPrompt() {
                let p = `Actúa como arquitecto de información, diseñador editorial y especialista en infografías educativas.\n\n`;
                p += `Genera una infografía profesional PNFT siguiendo estrictamente este proceso:\n\n`;
                p += `📎 DOCUMENTO FUENTE:\n${state.documentText}\n\n`;
                for (let key in state.answers) {
                    p += `📌 ${key}: ${state.answers[key]}\n`;
                }
                p += `\n🖼️ ETAPA 9 – INFOGRAFÍA FINAL:\n`;
                p += `Formato 16:9, paleta PNFT (#09B7AE, #0BD2CE, #014D6B, #0B6284, #62BDF3, #063B7F, #45258F, #9ED16F, #C9C9C9), tipografía Poppins, iconos 3D semi realistas, estilo educativo profesional secundaria. No infantil, no comercial. Respetar fielmente el contenido original sin modificarlo, resumirlo o agregar nada.`;
                return p;
            }

            // Llamada a Gemini
            async function callGemini(prompt) {
                if (!state.apiKey || !state.apiKey.startsWith('AIza')) throw new Error('Clave Gemini no configurada.');
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.apiKey}`, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({
                        contents:[{parts:[{text:prompt}]}],
                        generationConfig:{temperature:0.4, maxOutputTokens:2500}
                    })
                });
                if (!res.ok) {
                    const err = await res.json().catch(()=>({}));
                    throw new Error(err.error?.message || 'Error ' + res.status);
                }
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            }

            // Función de análisis (solo se llama con el botón "Analizar con IA")
            async function performAnalysis() {
                if (state.analysisInProgress) return;
                state.analysisInProgress = true;
                const step = steps[state.step];
                const analysisPrompt = `Analiza el siguiente documento curricular y responde ÚNICAMENTE con un JSON que contenga la información solicitada para la etapa "${step.field}".\n\nDocumento:\n${state.documentText}\n\nFormato JSON esperado (ejemplo): {"temas_principales": ["..."], ...}`;
                addMessage('assistant', '⏳ Analizando con IA...');
                try {
                    let result;
                    if (state.mode === 'gemini' && state.apiKey) {
                        result = await callGemini(analysisPrompt);
                    } else {
                        // Modo ChatGPT: copiar prompt y esperar respuesta manual
                        navigator.clipboard.writeText(analysisPrompt);
                        toast('📋 Prompt copiado. Pégalo en ChatGPT y luego pega aquí la respuesta JSON.');
                        result = await new Promise(resolve => {
                            const input = document.getElementById('userInput');
                            input.placeholder = 'Pega aquí el JSON de la IA...';
                            input.focus();
                            const origHandler = document.getElementById('btnSend').onclick;
                            document.getElementById('btnSend').onclick = () => {
                                resolve(input.value.trim());
                                input.placeholder = 'Escribe aquí...';
                                document.getElementById('btnSend').onclick = origHandler;
                            };
                        });
                    }
                    // Intentar parsear JSON
                    const jsonData = JSON.parse(result.replace(/```json|```/g, ''));
                    // Mostrar sugerencias
                    showSuggestionCards(jsonData, step.field);
                } catch (e) {
                    addMessage('assistant', `❌ Error: ${e.message}. Responde manualmente.`);
                }
                state.analysisInProgress = false;
            }

            function showSuggestionCards(jsonData, field) {
                const container = document.getElementById('chatPanel');
                const cardDiv = document.createElement('div');
                cardDiv.className = 'message assistant';
                let html = '<div class="avatar">🤖</div><div class="bubble"><strong>Sugerencias de la IA:</strong><br>';
                html += `<pre style="font-size:0.8rem;">${JSON.stringify(jsonData, null, 2)}</pre>`;
                html += `<div style="margin-top:0.8rem;display:flex;gap:0.5rem;">
                    <button class="btn btn-sm accept-suggestion">✅ Usar</button>
                    <button class="btn btn-outline btn-sm edit-suggestion">✏️ Editar</button>
                </div></div>`;
                cardDiv.innerHTML = html;
                container.appendChild(cardDiv);
                container.scrollTop = container.scrollHeight;

                const acceptBtn = cardDiv.querySelector('.accept-suggestion');
                const editBtn = cardDiv.querySelector('.edit-suggestion');
                acceptBtn.addEventListener('click', () => {
                    state.answers[field] = JSON.stringify(jsonData);
                    state.step++;
                    saveState(); updateUI();
                    cardDiv.remove();
                    showStep(state.step);
                });
                editBtn.addEventListener('click', () => {
                    const textarea = document.createElement('textarea');
                    textarea.value = JSON.stringify(jsonData, null, 2);
                    textarea.rows = 4;
                    cardDiv.querySelector('.bubble').appendChild(textarea);
                    const saveBtn = document.createElement('button');
                    saveBtn.textContent = 'Guardar cambios';
                    saveBtn.className = 'btn btn-sm';
                    saveBtn.addEventListener('click', () => {
                        try {
                            const newData = JSON.parse(textarea.value);
                            state.answers[field] = JSON.stringify(newData);
                            state.step++;
                            saveState(); updateUI();
                            cardDiv.remove();
                            showStep(state.step);
                        } catch (e) { toast('JSON inválido'); }
                    });
                    cardDiv.querySelector('.bubble').appendChild(saveBtn);
                    acceptBtn.disabled = true;
                    editBtn.disabled = true;
                });
            }

            // Manejar envío de texto
            async function handleSend() {
                const input = document.getElementById('userInput');
                const text = input.value.trim();
                const action = document.getElementById('btnSend').dataset.action;

                if (action === 'generate') {
                    const master = buildMasterPrompt();
                    if (state.mode === 'gemini' && state.apiKey) {
                        addMessage('assistant', '⏳ Generando infografía...');
                        try {
                            const result = await callGemini(master);
                            addMessage('assistant', '🎉 ¡Infografía lista!\n\n' + result);
                        } catch (e) {
                            addMessage('assistant', '❌ ' + e.message);
                        }
                    } else {
                        navigator.clipboard.writeText(master);
                        addMessage('assistant', '📋 Prompt maestro copiado. Pégalo en ChatGPT para obtener la infografía.');
                    }
                    document.getElementById('btnSend').textContent = '🔄 Reiniciar';
                    document.getElementById('btnSend').dataset.action = 'reset';
                    return;
                }

                if (action === 'reset') {
                    state.step = 0; state.answers = {}; state.documentText = '';
                    document.getElementById('chatPanel').innerHTML = '';
                    document.getElementById('btnSend').textContent = '➤';
                    document.getElementById('btnSend').dataset.action = 'answer';
                    showStep(0); updateUI(); saveState();
                    return;
                }

                if (!text) return;

                // Procesar respuesta manual
                const field = steps[state.step].field;
                if (field === 'document') {
                    state.documentText = text;
                    addMessage('user', '📄 Documento guardado (' + text.length + ' caracteres)');
                } else {
                    state.answers[field] = text;
                    addMessage('user', text);
                }
                state.step++;
                saveState(); updateUI();
                input.value = '';
                showStep(state.step);
            }

            // Event Listeners
            document.getElementById('btnSend').addEventListener('click', handleSend);
            document.getElementById('userInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
            });
            document.getElementById('btnSkipStep').addEventListener('click', () => {
                const field = steps[state.step].field;
                state.answers[field] = 'No especificado';
                state.step++;
                saveState(); updateUI();
                showStep(state.step);
            });
            document.getElementById('btnAnalyze').addEventListener('click', performAnalysis);

            // Cambio de modo
            document.querySelectorAll('.mode-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    state.mode = opt.dataset.mode;
                    saveState(); updateUI();
                    toast('Modo: ' + (state.mode === 'gemini' ? 'Gemini (gratis)' : 'ChatGPT (copiar prompt)'));
                });
            });

            // Modal API Key
            document.getElementById('btnApiKey').addEventListener('click', () => {
                document.getElementById('apiKeyInput').value = state.apiKey;
                document.getElementById('modalApi').style.display = 'flex';
            });
            document.getElementById('btnCancelApi').addEventListener('click', () => document.getElementById('modalApi').style.display = 'none');
            document.getElementById('btnSaveApi').addEventListener('click', () => {
                state.apiKey = document.getElementById('apiKeyInput').value.trim();
                saveState();
                document.getElementById('modalApi').style.display = 'none';
                toast('Clave guardada');
            });

            document.getElementById('btnReset').addEventListener('click', () => {
                if (confirm('¿Reiniciar todo?')) {
                    state.step=0; state.answers={}; state.documentText='';
                    document.getElementById('chatPanel').innerHTML = '';
                    document.getElementById('btnSend').textContent = '➤';
                    document.getElementById('btnSend').dataset.action = 'answer';
                    showStep(0); updateUI(); saveState();
                }
            });

            // Carga de archivos
            document.getElementById('btnUploadFile').addEventListener('click', () => document.getElementById('fileInput').click());
            document.getElementById('fileInput').addEventListener('change', async (e) => {
                const file = e.target.files[0]; if (!file) return;
                toast('⏳ Extrayendo texto...');
                try {
                    let text = ''; const ext = file.name.split('.').pop().toLowerCase();
                    if (ext === 'txt') text = await file.text();
                    else if (ext === 'docx') {
                        const buf = await file.arrayBuffer();
                        text = (await mammoth.extractRawText({arrayBuffer: buf})).value;
                    } else if (ext === 'pdf') {
                        const buf = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({data: buf}).promise;
                        for (let i=1; i<=pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map(it=>it.str).join(' ')+'\n';
                        }
                    } else if (ext === 'pptx') {
                        const buf = await file.arrayBuffer();
                        const json = pptx2json(buf);
                        json.slides.forEach(s => s.texts.forEach(t => text += t+'\n'));
                    } else throw new Error('Formato no soportado');
                    document.getElementById('userInput').value = text;
                    toast('✅ Texto extraído. Envíalo.');
                } catch (err) { toast('❌ '+err.message); }
            });

            // Inicializar
            const savedStep = localStorage.getItem('pnft_step');
            if (savedStep) state.step = parseInt(savedStep);
            const savedAnswers = localStorage.getItem('pnft_answers');
            if (savedAnswers) state.answers = JSON.parse(savedAnswers);
            state.documentText = localStorage.getItem('pnft_document') || '';
            updateUI();
            showStep(state.step);
        })();
    </script>
</body>
</html>
