<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNFT Infografía Lab · Sistema Guiado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptx2json@0.0.7/dist/pptx2json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #F8FAFC; --surface: #FFFFFF; --border: #E2E8F0;
            --text: #1E293B; --text-secondary: #64748B;
            --primary: #09B7AE; --primary-hover: #089B92;
            --danger: #EF4444; --warning: #F59E0B; --success: #10B981;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 12px; --radius-lg: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height:100vh; display:flex; flex-direction:column; }
        header { background: var(--surface); padding:0.75rem 1.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.75rem; box-shadow: var(--shadow-sm); position:sticky; top:0; z-index:100; }
        .logo { display:flex; align-items:center; gap:0.5rem; font-weight:700; font-size:1.1rem; color:#014D6B; }
        .logo-icon { width:34px; height:34px; background:linear-gradient(135deg, #09B7AE, #063B7F); border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:0.9rem; }
        .btn { font-family:inherit; font-weight:600; font-size:0.85rem; padding:0.5rem 1rem; border-radius:30px; border:none; cursor:pointer; transition:0.2s; display:inline-flex; align-items:center; gap:0.4rem; background:var(--primary); color:#fff; }
        .btn:hover { background:var(--primary-hover); }
        .btn-outline { background:transparent; color:var(--primary); border:1.5px solid var(--primary); }
        .btn-outline:hover { background:var(--primary); color:#fff; }
        .btn-sm { padding:0.4rem 0.8rem; font-size:0.8rem; }
        .main-container { display:flex; flex:1; overflow:hidden; }
        .toolbar { width:280px; background:var(--surface); border-right:1px solid var(--border); padding:1rem; display:flex; flex-direction:column; gap:1rem; overflow-y:auto; max-height:calc(100vh - 70px); }
        .toolbar label { font-weight:600; font-size:0.8rem; color:var(--text-secondary); display:block; margin-bottom:0.3rem; }
        select, input[type="text"], input[type="number"] { width:100%; padding:0.5rem 0.75rem; border-radius:8px; border:1.5px solid var(--border); font-family:inherit; font-size:0.85rem; background:var(--bg); }
        select:focus, input:focus { outline:none; border-color:var(--primary); }
        .canvas-area { flex:1; padding:1.5rem; overflow-y:auto; display:flex; flex-direction:column; align-items:center; gap:1.5rem; }
        .canvas { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding:2rem; display:flex; flex-direction:column; gap:1.5rem; width:100%; max-width:1200px; }
        .block-card { background: #fff; border:2px solid var(--border); border-radius:var(--radius); padding:1rem; cursor:move; position:relative; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s; }
        .block-card:hover { box-shadow: var(--shadow-md); }
        .block-card.density-warn { border-color: var(--warning); }
        .block-card.density-bad { border-color: var(--danger); }
        .block-card .block-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.5rem; }
        .block-card .block-icon { font-size:2rem; }
        .block-card textarea { width:100%; border:1px solid var(--border); border-radius:8px; padding:0.5rem; font-family:inherit; font-size:0.9rem; resize:vertical; background:var(--bg); }
        .block-card .block-controls { display:flex; gap:0.5rem; margin-top:0.5rem; flex-wrap:wrap; align-items:center; }
        .density-indicator { display:inline-block; width:12px; height:12px; border-radius:50%; margin-left:8px; }
        .density-ok { background: var(--success); } .density-warn { background: var(--warning); } .density-bad { background: var(--danger); }
        .toast { position:fixed; bottom:2rem; right:2rem; background:#1E293B; color:#fff; padding:0.8rem 1.5rem; border-radius:30px; font-weight:600; z-index:999; opacity:0; transition:0.3s; }
        .toast.show { opacity:1; }
        .pnft-panel { background: #EFF6FF; border:1px solid #BFDBFE; border-radius:var(--radius); padding:1rem; margin-top:1rem; }
        .pnft-panel h4 { color:#1E40AF; margin-bottom:0.5rem; }
        .fidelity-alert { background: #FEF3C7; border:1px solid #F59E0B; border-radius:8px; padding:0.5rem; margin:0.5rem 0; font-size:0.8rem; }
        /* Panel de pasos de análisis */
        .analysis-steps { background: #fff; border:2px solid var(--primary); border-radius:var(--radius-lg); padding:1.5rem; margin-bottom:1rem; }
        .analysis-steps h3 { color: var(--primary); margin-bottom:0.75rem; }
        .step-item { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; font-size:0.9rem; }
        .step-indicator { width:24px; height:24px; border-radius:50%; background: var(--bg); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.8rem; }
        .step-item.active .step-indicator { background: var(--primary); color: #fff; }
        .step-item.completed .step-indicator { background: var(--success); color: #fff; }
        @media (max-width:800px) { .main-container { flex-direction:column; } .toolbar { width:100%; max-height:auto; flex-direction:row; flex-wrap:wrap; } .canvas { max-width:100%; } }
    </style>
</head>

    <header>
        <div class="logo"><div class="logo-icon">P</div> Infografía Lab · Sistema Guiado</div>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">

            <button class="btn btn-sm" id="btnReset">↺ Nuevo</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="toolbar" id="toolbar">

            <div><label>🖥️ Resolución</label><select id="resolution"><option value="640x480">640 × 480</option><option value="1280x720">1280 × 720</option><option value="1920x1080" selected>1920 × 1080</option><option value="2560x1440">2560 × 1440</option><option value="3840x2160">3840 × 2160</option></select></div>
            <div><label>🔤 Tipografía</label><select id="fontFamily"><option value="Poppins" selected>Poppins</option><option value="Inter">Inter</option><option value="Montserrat">Montserrat</option><option value="Roboto">Roboto</option></select></div>
            <div><label>📏 Tamaño base</label><input type="number" id="baseFontSize" value="16" min="12" max="24" step="1"></div>
            <div><label>🏷️ Título</label><input type="text" id="docTitle" placeholder="Título de la infografía"></div>
            <div><label>📝 Subtítulo</label><input type="text" id="docSubtitle" placeholder="Subtítulo opcional"></div>
            <button class="btn btn-sm" id="btnAddBlock">➕ Agregar bloque</button>
            <button class="btn btn-outline btn-sm" id="btnLoadDocument">📂 Cargar documento</button>
            <input type="file" id="fileInput" accept=".docx,.pdf,.pptx,.txt" hidden>
            <button class="btn btn-sm" id="btnAnalyze">🤖 Analizar con PNFT</button>
            <button class="btn btn-sm btn-outline" id="btnVerifyFidelity">🔍 Verificar fidelidad</button>
            <button class="btn btn-sm" id="btnPreview">👁️ Previsualizar</button>
            <button class="btn btn-sm" id="btnBuildPrompt">🪄 Generar prompt</button>
            <details class="pnft-panel" id="pnftPanel" open>
                <summary style="cursor:pointer; font-weight:600;">📋 Recomendaciones PNFT</summary>
                <div id="pnftRecommendations" style="margin-top:0.5rem;"><p style="font-size:0.85rem; color:var(--text-secondary);">Ejecuta "Analizar con PNFT" para obtener sugerencias.</p></div>
            </details>
            <details class="pnft-panel"><summary style="cursor:pointer; font-weight:600;">⚙️ JSON (avanzado)</summary><textarea id="jsonEditor" rows="6" style="font-family:monospace; font-size:0.8rem; width:100%; margin-top:0.5rem;"></textarea><button class="btn btn-outline btn-sm" id="btnUpdateFromJSON" style="margin-top:0.5rem;">Actualizar desde JSON</button></details>
        </aside>

        <div class="canvas-area">
            <div id="analysisSteps" class="analysis-steps" style="display:none;">
                <h3>🧩 Pasos de Análisis PNFT</h3>
                <div class="step-item" data-step="1"><span class="step-indicator">1</span> Análisis de Estructura</div>
                <div class="step-item" data-step="2"><span class="step-indicator">2</span> Análisis de Jerarquía</div>
                <div class="step-item" data-step="3"><span class="step-indicator">3</span> Análisis de Estilo y Restricciones</div>
                <textarea id="pasteResponse" rows="4" placeholder="Pega aquí la respuesta de ChatGPT para el paso actual..." style="margin-top:1rem; display:none;"></textarea>
                <div style="margin-top:0.5rem; display:flex; gap:0.5rem;" id="analysisActions">
                    <button class="btn btn-sm" id="btnSubmitPaste" style="display:none;">✅ Enviar respuesta</button>
                    <button class="btn btn-sm btn-outline" id="btnCancelAnalysis" style="display:none;">Cancelar</button>
                </div>
            </div>
            <div class="canvas" id="canvas"></div>
        </div>
    </div>

    <div id="modalApi" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;">
        <div style="background:#fff;padding:2rem;border-radius:20px;max-width:400px;width:90%;"><h3>🔑 Clave Gemini (gratis)</h3><p style="font-size:0.85rem;"><a href="https://aistudio.google.com/apikey" target="_blank">Obtener clave gratuita</a></p><input type="password" id="apiKeyInput" placeholder="AIza..." style="width:100%;margin:0.5rem 0;"><button class="btn" id="btnSaveApi">Guardar</button><button class="btn btn-outline" id="btnCancelApi">Cancelar</button></div>
    </div>
    <div class="toast" id="toast"></div>

            function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show'; clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500); }
            function saveState() {
                localStorage.setItem('pnft_api_key', state.apiKey);
                localStorage.setItem('pnft_blocks', JSON.stringify(state.blocks));
                localStorage.setItem('pnft_settings', JSON.stringify(state.settings));

            function buildPrompt(blockIndex) {
                let prompt = analysisBlocks[blockIndex].promptBase;
                if (blockIndex === 0) prompt += '\n\n📎 DOCUMENTO FUENTE:\n' + state.documentText;
                else {
                    prompt += '\n\n📋 CONTEXTO ACUMULADO (respuestas previas):';
                    for (let i = 0; i < blockIndex; i++) if (state.stepResponses[analysisBlocks[i].id]) prompt += '\n\n✅ ' + analysisBlocks[i].title + ':\n' + state.stepResponses[analysisBlocks[i].id];
                }
                return prompt;
            }

            async function callGemini(prompt) {
                if (!state.apiKey) throw new Error('Clave Gemini no configurada');
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.apiKey}`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.4, maxOutputTokens:3000} })
                });
                if (!res.ok) throw new Error((await res.json()).error?.message);
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            }

            function updateStepIndicators(activeStep) {
                document.querySelectorAll('.step-item').forEach(item => {
                    const step = parseInt(item.dataset.step);
                    item.classList.remove('active', 'completed');
                    if (step < activeStep) item.classList.add('completed');
                    else if (step === activeStep) item.classList.add('active');
                });
            }

                const pasteTextarea = document.getElementById('pasteResponse');

                submitBtn.style.display = 'inline-flex';
                cancelBtn.style.display = 'inline-flex';
                pasteTextarea.value = '';

                updateStepIndicators(stepIndex+1);
                document.getElementById('analysisSteps').style.display = 'block';
            }

            function hidePasteUI() {
                document.getElementById('pasteResponse').style.display = 'none';
                document.getElementById('btnSubmitPaste').style.display = 'none';
                document.getElementById('btnCancelAnalysis').style.display = 'none';
                document.getElementById('analysisSteps').style.display = 'none';
            }

            async function runAllAnalysisBlocks() {
                if (!state.documentText) return toast('Primero carga un documento');
                if (state.analysisInProgress) return;
                state.analysisInProgress = true;
                hidePasteUI();
                try {
                    // Si hay API key, ejecutar todo automáticamente
                    if (state.apiKey) {
                        toast('⏳ Ejecutando análisis PNFT automático...');
                        for (let i = 0; i < 3; i++) {
                            updateStepIndicators(i+1);
                            const response = await callGemini(buildPrompt(i));
                            state.stepResponses[analysisBlocks[i].id] = response;
                            state.approvedSteps.add(analysisBlocks[i].id);
                        }
                        finishAnalysis();
                    } else {
                        // Sin API: guiar paso a paso
                        state.analysisStep = 1;
                        showPasteUI(0);
                        document.getElementById('btnSubmitPaste').onclick = async () => {
                            const text = document.getElementById('pasteResponse').value.trim();
                            if (!text) return toast('Pega la respuesta primero');
                            state.stepResponses[analysisBlocks[state.analysisStep-1].id] = text;
                            state.approvedSteps.add(analysisBlocks[state.analysisStep-1].id);
                            if (state.analysisStep < 3) {
                                state.analysisStep++;
                                showPasteUI(state.analysisStep-1);
                            } else {
                                finishAnalysis();
                            }
                        };
                        document.getElementById('btnCancelAnalysis').onclick = () => {
                            hidePasteUI();
                            state.analysisInProgress = false;
                        };
                    }
                } catch (err) {
                    toast('❌ Error: ' + err.message);
                    state.analysisInProgress = false;
                }
            }

            function finishAnalysis() {
                const json = buildInitialJSON();
                state.json = JSON.stringify(json, null, 2);
                document.getElementById('jsonEditor').value = state.json;
                const ruta = json.infografía["ruta implementación"] || [];
                state.blocks = ruta.map((item, idx) => ({
                    id: Date.now() + idx, title: item.titulo, color: '#0B6284', icon: item.icono_3d || '🧠', text: item.descripción
                }));
                renderCanvas();
                updatePNFTRecommendations();
                hidePasteUI();
                state.analysisInProgress = false;
                saveState();
                toast('✅ Análisis PNFT completado. Ya puedes editar los bloques.');
            }

            function extractSectionsFromStructure() {
                const estructura = state.stepResponses['estructura'] || '';
                const headerRegex = /^(?:(?:PASO|BLOQUE|TARJETA|SECCIÓN)\s*[A-Za-z0-9]*[:\-]?|(?:\d+[\.\)]\s)|[-•]\s)(.*)$/gim;
                const sections = []; let match; let lastIndex = 0;
                while ((match = headerRegex.exec(estructura)) !== null) {
                    if (sections.length > 0) sections[sections.length-1].text = estructura.substring(lastIndex, match.index).trim();
                    sections.push({ title: match[1].trim(), text: '' });
                    lastIndex = match.index + match[0].length;
                }
                if (sections.length > 0) sections[sections.length-1].text = estructura.substring(lastIndex).trim();
                sections.forEach(s => {
                    s.text = s.text.replace(/[─│┌┐└┘├┤┬┴┼═]/g, '').replace(/\[\d+[–\-]\d+\]\s*/g, '').replace(/→ FUNCIÓN:.*$/gm, '').replace(/\n{3,}/g, '\n\n').trim();
                    const flujoIndex = s.text.indexOf('FLUJO VISUAL RESUMIDO'); if (flujoIndex !== -1) s.text = s.text.substring(0, flujoIndex).trim();
                    const consIndex = s.text.indexOf('CONSIDERACIÓN FINAL'); if (consIndex !== -1) s.text = s.text.substring(0, consIndex).trim();
                });
                if (sections.length === 0) sections.push({ title: 'Infografía PNFT', text: estructura.replace(/[─│┌┐└┘├┤┬┴┼═]/g, '').trim() });
                sections.forEach(s => { if (!s.text) s.text = '(Sin contenido específico extraído – edita este texto)'; });
                return sections;
            }

            function buildInitialJSON() {
                const estructura = state.stepResponses['estructura'] || '';
                const titleMatch = estructura.match(/título[:\s]*([^\n]+)/i) || [];
                const subMatch = estructura.match(/subtítulo[:\s]*([^\n]+)/i) || [];
                const sections = extractSectionsFromStructure();
                const rutaImplementacion = sections.map((s, idx) => ({ paso: idx+1, titulo: s.title, icono_3d: '🧠', descripción: s.text }));
                let rawTitle = titleMatch[1] ? titleMatch[1].trim() : (state.documentText.split('\n')[0] || 'Infografía PNFT');
                rawTitle = rawTitle.replace(/[─│┌┐└┘├┤┬┴┼═]/g, '').replace(/\s{2,}/g, ' ').trim();
                return { infografía: { titulo: rawTitle, subtitulo: subMatch[1] ? subMatch[1].trim() : 'Orientaciones para la implementación curricular', propósito: { pregunta: '¿CUÁL ES EL PROPÓSITO DE ESTA ESTRATEGIA?', contenido: '' }, "ruta implementación": rutaImplementacion, aspectos_clave: [], ejes_transversales: [], Recomendaciones: [], mensaje_clave: {}, lineamientos_diseno: { orientacion: 'horizontal', tipografia: 'Poppins', estilo_visual: 'educativo_tecnologico', iconografia: '3D educativa', calidad: 'alta', nitidez: 'alta', paleta_pnft: { turquesa_principal: '#09b7ae', turquesa_secundario: '#0bd2ce', azul_oscuro: '#014d6b', azul_medio: '#0b6284', celeste: '#62bdf3', azul_institucional: '#063b7f', morado: '#45258f', verde: '#9ed16f', gris: '#c9c9c9' } } };
            }

            function updatePNFTRecommendations() {
                const container = document.getElementById('pnftRecommendations');
                const jerarquia = state.stepResponses['jerarquia'] || '', estilo = state.stepResponses['estilo'] || '';
                if (!jerarquia && !estilo) { container.innerHTML = '<p style="font-size:0.85rem;">Ejecuta "Analizar con PNFT" para obtener sugerencias.</p>'; return; }
                let html = '';
                const tipografiaMatch = jerarquia.match(/Poppins\s*(Bold|SemiBold|Regular)/gi);
                if (tipografiaMatch) html += `<p><strong>Tipografía sugerida:</strong> ${tipografiaMatch.join(', ')}</p>`;
                if (estilo.includes('No modificar')) html += '<p><strong>⚠️ Restricción:</strong> No modificar, resumir ni reinterpretar el contenido.</p>';
                if (estilo.includes('infantil')) html += '<p><strong>🚫 Prohibido:</strong> Estilo infantil, caricaturas, emojis, clipart.</p>';
                container.innerHTML = html || '<p>Análisis completado.</p>';
            }

                const canvas = document.getElementById('canvas'); canvas.innerHTML = '';
                state.blocks.forEach((block, index) => {
                    const card = document.createElement('div'); card.className = 'block-card'; card.draggable = true; card.dataset.index = index;

            document.getElementById('btnVerifyFidelity').addEventListener('click', checkFidelity);
            document.getElementById('orientation').addEventListener('change', (e) => { state.settings.orientation = e.target.value; saveState(); });
            document.getElementById('resolution').addEventListener('change', (e) => { state.settings.resolution = e.target.value; saveState(); });
            document.getElementById('fontFamily').addEventListener('change', (e) => { state.settings.fontFamily = e.target.value; saveState(); });
            document.getElementById('baseFontSize').addEventListener('input', (e) => { state.settings.baseFontSize = parseInt(e.target.value); saveState(); });
            document.getElementById('docTitle').addEventListener('input', (e) => { state.settings.title = e.target.value; saveState(); });
            document.getElementById('docSubtitle').addEventListener('input', (e) => { state.settings.subtitle = e.target.value; saveState(); });
            document.getElementById('btnPreview').addEventListener('click', openPreview);
            document.getElementById('btnBuildPrompt').addEventListener('click', () => {
                let prompt = `Genera una infografía educativa PNFT con estos parámetros:\n\nDocumento fuente: ${state.documentText}\n\nOrientación: ${state.settings.orientation}\nResolución: ${state.settings.resolution}\nTipografía: ${state.settings.fontFamily}, tamaño base ${state.settings.baseFontSize}px\nTítulo: ${state.settings.title}\nSubtítulo: ${state.settings.subtitle}\n\nBloques:\n`;
                state.blocks.forEach((b, i) => { prompt += `${i+1}. Color: ${b.color}, Icono: ${b.icon}\n${b.text}\n\n`; });
                prompt += `Requisitos: formato 16:9, paleta PNFT, iconos 3D, estilo educativo profesional secundaria, no infantil.\nAnálisis de jerarquía:\n${state.stepResponses['jerarquia']||''}\n\nAnálisis de estilo:\n${state.stepResponses['estilo']||''}`;
                navigator.clipboard.writeText(prompt).then(() => toast('📋 Prompt copiado'));
            });
            document.getElementById('btnUpdateFromJSON').addEventListener('click', () => {
                try { const data = JSON.parse(document.getElementById('jsonEditor').value); state.json = document.getElementById('jsonEditor').value; const ruta = data.infografía["ruta implementación"] || []; state.blocks = ruta.map((item, idx) => ({ id: Date.now()+idx, title: item.titulo, color: '#0B6284', icon: item.icono_3d||'🧠', text: item.descripción })); renderCanvas(); saveState(); toast('✅ Actualizado desde JSON'); } catch (e) { toast('❌ JSON inválido'); }
            });
            document.getElementById('btnReset').addEventListener('click', () => {
                if (confirm('¿Reiniciar?')) { state.documentText = ''; state.blocks = []; state.json = ''; state.stepResponses = {}; state.approvedSteps.clear(); document.getElementById('docTitle').value = ''; document.getElementById('docSubtitle').value = ''; saveState(); renderCanvas(); }
            });

            // Inicialización
            const savedBlocks = localStorage.getItem('pnft_blocks'); if (savedBlocks) state.blocks = JSON.parse(savedBlocks);
            const savedSettings = localStorage.getItem('pnft_settings'); if (savedSettings) { state.settings = JSON.parse(savedSettings); document.getElementById('orientation').value = state.settings.orientation; document.getElementById('resolution').value = state.settings.resolution; document.getElementById('fontFamily').value = state.settings.fontFamily; document.getElementById('baseFontSize').value = state.settings.baseFontSize; document.getElementById('docTitle').value = state.settings.title; document.getElementById('docSubtitle').value = state.settings.subtitle; }
            state.documentText = localStorage.getItem('pnft_document') || '';
            if (state.json) document.getElementById('jsonEditor').value = state.json;
            if (state.stepResponses['estructura']) updatePNFTRecommendations();
            renderCanvas();
        })();
    </script>
</body>
</html>
