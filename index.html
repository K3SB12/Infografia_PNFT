<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNFT Infografía Lab · Modo Colega</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://unpkg.com/pptx2json@0.0.7/dist/pptx2json.min.js"></script>
    <style>
        :root {
            --turquesa: #09B7AE; --azul-oscuro: #014D6B; --azul-inst: #063B7F;
            --verde: #9ED16F; --gris-neutro: #C9C9C9; --gris-claro: #E8ECF1;
            --blanco: #FFFFFF; --gris-texto: #4A5568; --fondo: #F5F7FA;
            --font: 'Poppins', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font); background: var(--fondo);
            color: #1A1D23; height:100vh; display:flex; flex-direction:column;
        }
        header {
            background: var(--blanco); padding:0.8rem 1.5rem;
            display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:0.8rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            z-index:100;
        }
        .logo { display:flex; align-items:center; gap:0.5rem; font-weight:700; color:var(--azul-oscuro); }
        .logo-icon {
            width:38px; height:38px; background:linear-gradient(135deg, var(--turquesa), var(--azul-inst));
            border-radius:10px; display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:800;
        }
        .btn {
            font-family:var(--font); font-weight:600; font-size:0.85rem;
            padding:0.5rem 1.2rem; border-radius:30px; border:none;
            cursor:pointer; transition:0.25s; display:inline-flex; align-items:center; gap:0.4rem;
            background:var(--turquesa); color:#fff; border:2px solid var(--turquesa);
        }
        .btn-outline { background:transparent; color:var(--turquesa); }
        .btn-outline:hover { background:var(--turquesa); color:#fff; }
        .btn:disabled { opacity:0.5; pointer-events:none; }
        .app-layout {
            display:flex; flex:1; overflow:hidden;
        }
        .chat-side {
            width:40%; min-width:300px; background:var(--blanco);
            display:flex; flex-direction:column; box-shadow: 0 8px 32px rgba(0,0,0,0.08); z-index:10;
        }
        .chat-messages {
            flex:1; overflow-y:auto; padding:1.2rem; display:flex; flex-direction:column; gap:1rem;
        }
        .message { display:flex; gap:0.8rem; align-items:flex-start; }
        .avatar {
            width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
            justify-content:center; font-size:1rem; flex-shrink:0;
        }
        .assistant .avatar { background:var(--turquesa); color:#fff; }
        .user .avatar { background:var(--azul-inst); color:#fff; }
        .bubble {
            background:var(--fondo); padding:0.8rem 1.2rem; border-radius:18px;
            max-width:85%; font-size:0.9rem; line-height:1.5; color:#1A1D23;
            border:1px solid var(--gris-neutro);
        }
        .user .bubble { background:var(--turquesa); color:#fff; border-color:var(--turquesa); }
        .chat-input {
            padding:1rem; border-top:1px solid var(--gris-claro);
        }
        textarea, input[type="text"] {
            font-family:var(--font); width:100%; padding:0.7rem 1rem;
            border-radius:14px; border:1.5px solid var(--gris-neutro);
            font-size:0.9rem; background:var(--blanco); resize:none;
        }
        textarea:focus, input:focus { border-color:var(--turquesa); outline:none; box-shadow:0 0 0 3px rgba(9,183,174,0.1); }
        .design-side {
            flex:1; background:var(--fondo); padding:1.5rem; overflow-y:auto;
            display:flex; flex-direction:column; gap:1rem;
        }
        .design-card {
            background:var(--blanco); border-radius:16px; padding:1.2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        .design-card h3 { color:var(--azul-oscuro); margin-bottom:0.5rem; }
        .editable-field {
            width:100%; border:1px dashed var(--gris-neutro); border-radius:8px;
            padding:0.5rem; margin:0.3rem 0; font-family:var(--font);
            background:var(--gris-claro); font-size:0.85rem;
        }
        .editable-field:focus { border-color:var(--turquesa); background:#fff; }
        .color-palette {
            display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.5rem;
        }
        .color-dot {
            width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent;
        }
        .color-dot.selected { border-color:var(--azul-oscuro); }
        .toast {
            position:fixed; bottom:2rem; right:2rem; background:var(--azul-inst);
            color:#fff; padding:0.8rem 1.5rem; border-radius:30px; font-weight:600;
            z-index:999; opacity:0; transition:0.3s;
        }
        .toast.show { opacity:1; }
        @media (max-width:800px) {
            .app-layout { flex-direction:column; }
            .chat-side { width:100%; max-height:50vh; }
            .design-side { flex:1; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">PNFT</div>
            <span>Infografía Lab · Modo Colega</span>
        </div>
        <div style="display:flex; gap:0.8rem; align-items:center;">
            <button class="btn btn-outline btn-sm" id="btnApiKey">🔑 Clave</button>
            <button class="btn btn-sm" id="btnReset">↺ Reiniciar</button>
        </div>
    </header>

    <div class="app-layout">
        <!-- Chat (izquierda) -->
        <div class="chat-side">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="bubble">
                        ¡Hola! Soy tu asistente para crear infografías curriculares PNFT.<br>
                        <strong>Pega tu documento</strong> (Word, PDF, PowerPoint) o <strong>carga un archivo</strong>.
                    </div>
                </div>
            </div>
            <div class="chat-input">
                <div style="display:flex; gap:0.5rem;">
                    <textarea id="userInput" rows="1" placeholder="Escribe aquí..."></textarea>
                    <button class="btn" id="btnSend">➤</button>
                </div>
                <div style="margin-top:0.5rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
                    <button class="btn btn-outline btn-sm" id="btnUploadFile">📂 Cargar archivo</button>
                    <button class="btn btn-outline btn-sm" id="btnIASuggest" style="display:none;">🤖 Sugerencia IA</button>
                </div>
                <input type="file" id="fileInput" accept=".docx,.pdf,.pptx,.txt" style="display:none;">
            </div>
        </div>

        <!-- Panel de diseño (derecha) -->
        <div class="design-side" id="designPanel">
            <div class="design-card" id="docInfoCard" style="display:none;">
                <h3>📄 Documento</h3>
                <p style="font-size:0.85rem; color:var(--gris-texto);" id="docSummary"></p>
            </div>
            <div class="design-card" id="infographicDraft" style="display:none;">
                <h3>🖼️ Borrador de infografía</h3>
                <label>Título principal</label>
                <input class="editable-field" id="editTitle" placeholder="Título de la infografía">
                <label>Idea principal</label>
                <input class="editable-field" id="editMainIdea" placeholder="Lo más importante a recordar">
                <label>Organización visual</label>
                <select class="editable-field" id="editLayout">
                    <option value="tarjetas">Tarjetas</option>
                    <option value="columnas">Columnas</option>
                    <option value="linea_tiempo">Línea de tiempo</option>
                </select>
                <label>Colores dominantes</label>
                <div class="color-palette" id="colorPalette">
                    <span class="color-dot" style="background:#09B7AE;" data-color="#09B7AE"></span>
                    <span class="color-dot" style="background:#014D6B;" data-color="#014D6B"></span>
                    <span class="color-dot" style="background:#9ED16F;" data-color="#9ED16F"></span>
                    <span class="color-dot" style="background:#45258F;" data-color="#45258F"></span>
                    <span class="color-dot" style="background:#62BDF3;" data-color="#62BDF3"></span>
                </div>
                <label>Secciones (puedes editar)</label>
                <textarea class="editable-field" id="editSections" rows="4" placeholder="Lista de secciones..."></textarea>
                <button class="btn btn-sm" id="btnGenerate" style="margin-top:0.8rem;">🖼️ Generar infografía final</button>
            </div>
        </div>
    </div>

    <!-- Modal API Key -->
    <div id="modalApi" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;">
        <div style="background:#fff;padding:2rem;border-radius:20px;max-width:400px;width:90%;">
            <h3>🔑 Clave Gemini (gratis)</h3>
            <p style="font-size:0.85rem;"><a href="https://aistudio.google.com/apikey" target="_blank">Obtener clave gratuita</a></p>
            <input type="password" id="apiKeyInput" placeholder="AIza...">
            <button class="btn" id="btnSaveApi">Guardar</button>
            <button class="btn btn-outline" id="btnCancelApi">Cancelar</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            const state = {
                apiKey: localStorage.getItem('pnft_api_key') || '',
                mode: 'gemini',
                documentText: '',
                design: {
                    title: '',
                    mainIdea: '',
                    layout: 'tarjetas',
                    colors: ['#09B7AE', '#014D6B'],
                    sections: []
                },
                conversationStep: 0, // 0=esperando documento, 1=pidiendo título, 2=idea principal, 3=organización, 4=secciones, 5=libre
                analysisInProgress: false,
            };

            function toast(msg) {
                const t = document.getElementById('toast');
                t.textContent = msg; t.className = 'toast show';
                clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
            }

            function addChatMessage(role, text) {
                const container = document.getElementById('chatMessages');
                const div = document.createElement('div');
                div.className = `message ${role}`;
                div.innerHTML = `<div class="avatar">${role==='assistant'?'🤖':'👤'}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }

            function updateDesignPanel() {
                document.getElementById('editTitle').value = state.design.title;
                document.getElementById('editMainIdea').value = state.design.mainIdea;
                document.getElementById('editLayout').value = state.design.layout;
                document.getElementById('editSections').value = state.design.sections.join('\n');
                document.querySelectorAll('.color-dot').forEach(dot => {
                    dot.classList.toggle('selected', state.design.colors.includes(dot.dataset.color));
                });
                if (state.documentText) {
                    document.getElementById('docInfoCard').style.display = 'block';
                    document.getElementById('docSummary').textContent = 'Documento cargado (' + state.documentText.length + ' caracteres)';
                }
                if (state.design.title || state.design.mainIdea || state.design.sections.length > 0) {
                    document.getElementById('infographicDraft').style.display = 'block';
                }
            }

            function saveState() {
                localStorage.setItem('pnft_api_key', state.apiKey);
                localStorage.setItem('pnft_design', JSON.stringify(state.design));
                localStorage.setItem('pnft_document', state.documentText);
                localStorage.setItem('pnft_convStep', state.conversationStep);
            }

            function askNextQuestion() {
                if (state.conversationStep === 0) {
                    // ya se preguntó por el documento, no hacemos nada
                } else if (state.conversationStep === 1) {
                    addChatMessage('assistant', '¿Qué <strong>título</strong> le ponemos a la infografía?');
                    document.getElementById('btnIASuggest').style.display = 'inline-flex';
                } else if (state.conversationStep === 2) {
                    addChatMessage('assistant', '¿Cuál es la <strong>idea principal</strong> que quieres que recuerden los estudiantes?');
                } else if (state.conversationStep === 3) {
                    addChatMessage('assistant', '¿Cómo prefieres organizar la información?<br><em>Tarjetas, columnas, línea de tiempo...</em>');
                } else if (state.conversationStep === 4) {
                    addChatMessage('assistant', '¿Qué <strong>secciones o temas</strong> debe tener la infografía? (escríbelos separados por comas o en líneas)');
                } else {
                    addChatMessage('assistant', '✅ ¡Listo! Puedes seguir ajustando el diseño a la derecha. Cuando estés listo, haz clic en <strong>Generar infografía final</strong>.');
                    document.getElementById('btnIASuggest').style.display = 'none';
                }
            }

            function processUserInput(text) {
                if (state.conversationStep === 1) {
                    state.design.title = text;
                } else if (state.conversationStep === 2) {
                    state.design.mainIdea = text;
                } else if (state.conversationStep === 3) {
                    state.design.layout = text.toLowerCase().includes('columna') ? 'columnas' : 
                                         text.toLowerCase().includes('línea') ? 'linea_tiempo' : 'tarjetas';
                } else if (state.conversationStep === 4) {
                    const sections = text.split(/[,.\n]+/).map(s => s.trim()).filter(s => s);
                    state.design.sections = sections;
                }
                state.conversationStep++;
                saveState();
                updateDesignPanel();
                if (state.conversationStep <= 4) {
                    askNextQuestion();
                } else {
                    addChatMessage('assistant', 'Puedes editar cualquier campo del diseño a la derecha. Cuando estés listo, pulsa "Generar infografía final".');
                }
            }

            async function getIASuggestion() {
                if (state.analysisInProgress) return;
                state.analysisInProgress = true;
                const prompt = `Documento: ${state.documentText}\n\nProporciona una sugerencia para el título, idea principal y una lista de secciones para una infografía educativa. Devuelve ÚNICAMENTE un JSON con el formato: {"title": "...", "mainIdea": "...", "sections": ["..."]}`;
                try {
                    let result;
                    if (state.apiKey && state.mode === 'gemini') {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.apiKey}`, {
                            method:'POST',
                            headers:{'Content-Type':'application/json'},
                            body: JSON.stringify({
                                contents:[{parts:[{text:prompt}]}],
                                generationConfig:{temperature:0.4, maxOutputTokens:1000}
                            })
                        });
                        if (!res.ok) throw new Error((await res.json()).error?.message);
                        const data = await res.json();
                        result = data.candidates[0].content.parts[0].text;
                    } else {
                        navigator.clipboard.writeText(prompt);
                        toast('Prompt copiado. Pega la respuesta JSON aquí.');
                        result = await new Promise(resolve => {
                            const input = document.getElementById('userInput');
                            input.placeholder = 'Pega aquí la respuesta JSON...';
                            const origHandler = document.getElementById('btnSend').onclick;
                            document.getElementById('btnSend').onclick = () => {
                                resolve(input.value.trim());
                                input.placeholder = 'Escribe aquí...';
                                document.getElementById('btnSend').onclick = origHandler;
                            };
                        });
                    }
                    const json = JSON.parse(result.replace(/```json|```/g, ''));
                    state.design.title = json.title || state.design.title;
                    state.design.mainIdea = json.mainIdea || state.design.mainIdea;
                    if (json.sections) state.design.sections = json.sections;
                    updateDesignPanel();
                    addChatMessage('assistant', '✨ He actualizado el diseño con sugerencias de la IA. Puedes editarlas a la derecha.');
                } catch (e) {
                    addChatMessage('assistant', '❌ No pude obtener sugerencias: ' + e.message);
                }
                state.analysisInProgress = false;
            }

            // Eventos
            document.getElementById('btnSend').addEventListener('click', () => {
                const input = document.getElementById('userInput');
                const text = input.value.trim();
                if (!text) return;
                addChatMessage('user', text);
                input.value = '';

                // Si aún no hay documento, lo guardamos como documento
                if (state.conversationStep === 0 && !state.documentText) {
                    state.documentText = text;
                    state.conversationStep = 1; // Pasamos a preguntar título
                    document.getElementById('docInfoCard').style.display = 'block';
                    document.getElementById('docSummary').textContent = 'Documento cargado (' + text.length + ' caracteres)';
                    addChatMessage('assistant', '📄 Documento recibido. Vamos a diseñar la infografía.');
                    askNextQuestion();
                    saveState();
                } else {
                    // Procesar la respuesta según la etapa
                    processUserInput(text);
                }
            });

            document.getElementById('btnUploadFile').addEventListener('click', () => document.getElementById('fileInput').click());
            document.getElementById('fileInput').addEventListener('change', async (e) => {
                const file = e.target.files[0]; if (!file) return;
                toast('⏳ Extrayendo texto...');
                try {
                    let text = ''; const ext = file.name.split('.').pop().toLowerCase();
                    if (ext === 'txt') text = await file.text();
                    else if (ext === 'docx') {
                        const buf = await file.arrayBuffer();
                        text = (await mammoth.extractRawText({arrayBuffer: buf})).value;
                    } else if (ext === 'pdf') {
                        const buf = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({data: buf}).promise;
                        for (let i=1; i<=pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map(it=>it.str).join(' ')+'\n';
                        }
                    } else if (ext === 'pptx') {
                        const buf = await file.arrayBuffer();
                        const json = pptx2json(buf);
                        json.slides.forEach(s => s.texts.forEach(t => text += t+'\n'));
                    } else throw new Error('Formato no soportado');
                    state.documentText = text;
                    state.conversationStep = 1;
                    document.getElementById('docInfoCard').style.display = 'block';
                    document.getElementById('docSummary').textContent = 'Documento cargado (' + text.length + ' caracteres)';
                    addChatMessage('assistant', '📄 Documento cargado correctamente. Vamos a diseñar la infografía.');
                    askNextQuestion();
                    saveState();
                } catch (err) { toast('❌ '+err.message); }
            });

            document.getElementById('btnIASuggest').addEventListener('click', getIASuggestion);

            // Sincronización del panel de diseño con el estado
            document.getElementById('editTitle').addEventListener('input', (e) => {
                state.design.title = e.target.value; saveState();
            });
            document.getElementById('editMainIdea').addEventListener('input', (e) => {
                state.design.mainIdea = e.target.value; saveState();
            });
            document.getElementById('editLayout').addEventListener('change', (e) => {
                state.design.layout = e.target.value; saveState();
            });
            document.getElementById('editSections').addEventListener('input', (e) => {
                state.design.sections = e.target.value.split('\n').filter(s => s.trim());
                saveState();
            });
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.addEventListener('click', () => {
                    const color = dot.dataset.color;
                    if (state.design.colors.includes(color)) {
                        state.design.colors = state.design.colors.filter(c => c !== color);
                    } else {
                        if (state.design.colors.length >= 2) state.design.colors.shift();
                        state.design.colors.push(color);
                    }
                    updateDesignPanel();
                    saveState();
                });
            });

            // Generar infografía final
            document.getElementById('btnGenerate').addEventListener('click', async () => {
                const prompt = `Genera una infografía educativa PNFT con estos parámetros:
                Título: ${state.design.title}
                Idea principal: ${state.design.mainIdea}
                Organización: ${state.design.layout}
                Colores dominantes: ${state.design.colors.join(', ')}
                Secciones: ${state.design.sections.join(', ')}
                Documento fuente: ${state.documentText}
                Requisitos: formato 16:9, tipografía Poppins, iconos 3D semi realistas, estilo profesional secundaria, no infantil.`;
                if (state.apiKey && state.mode === 'gemini') {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.apiKey}`, {
                            method:'POST',
                            headers:{'Content-Type':'application/json'},
                            body: JSON.stringify({
                                contents:[{parts:[{text:prompt}]}],
                                generationConfig:{temperature:0.4, maxOutputTokens:2000}
                            })
                        });
                        const data = await res.json();
                        const result = data.candidates[0].content.parts[0].text;
                        addChatMessage('assistant', '🎉 Infografía generada:\n' + result);
                    } catch (e) {
                        addChatMessage('assistant', '❌ Error: ' + e.message);
                    }
                } else {
                    navigator.clipboard.writeText(prompt);
                    addChatMessage('assistant', '📋 Prompt copiado. Pégalo en ChatGPT para obtener la infografía.');
                }
            });

            // Modal API Key
            document.getElementById('btnApiKey').addEventListener('click', () => {
                document.getElementById('apiKeyInput').value = state.apiKey;
                document.getElementById('modalApi').style.display = 'flex';
            });
            document.getElementById('btnCancelApi').addEventListener('click', () => document.getElementById('modalApi').style.display = 'none');
            document.getElementById('btnSaveApi').addEventListener('click', () => {
                state.apiKey = document.getElementById('apiKeyInput').value.trim();
                saveState();
                document.getElementById('modalApi').style.display = 'none';
                toast('Clave guardada');
            });

            document.getElementById('btnReset').addEventListener('click', () => {
                if (confirm('¿Reiniciar?')) {
                    state.documentText = '';
                    state.design = { title:'', mainIdea:'', layout:'tarjetas', colors:['#09B7AE','#014D6B'], sections:[] };
                    state.conversationStep = 0;
                    document.getElementById('chatMessages').innerHTML = '';
                    document.getElementById('docInfoCard').style.display = 'none';
                    document.getElementById('infographicDraft').style.display = 'none';
                    updateDesignPanel();
                    saveState();
                    addChatMessage('assistant', '¡Empecemos de nuevo! Pega tu documento.');
                }
            });

            // Inicializar estado guardado
            const savedDesign = localStorage.getItem('pnft_design');
            if (savedDesign) state.design = JSON.parse(savedDesign);
            state.documentText = localStorage.getItem('pnft_document') || '';
            state.conversationStep = parseInt(localStorage.getItem('pnft_convStep') || '0');
            if (state.documentText) {
                document.getElementById('docInfoCard').style.display = 'block';
                document.getElementById('docSummary').textContent = 'Documento cargado (' + state.documentText.length + ' caracteres)';
                if (state.conversationStep === 0) state.conversationStep = 1;
            }
            updateDesignPanel();
            if (state.conversationStep >= 1 && state.conversationStep <= 4) {
                askNextQuestion();
            } else if (state.conversationStep > 4) {
                addChatMessage('assistant', 'Puedes seguir editando el diseño o generar la infografía final.');
            }
        })();
    </script>
</body>
</html>
