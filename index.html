<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNFT Infografía Lab · Asistente Completo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://unpkg.com/pptx2json@0.0.7/dist/pptx2json.min.js"></script>
    <style>
        :root {
            --turquesa: #09B7AE; --azul-oscuro: #014D6B; --azul-inst: #063B7F;
            --verde: #9ED16F; --gris-neutro: #C9C9C9; --gris-claro: #E8ECF1;
            --blanco: #FFFFFF; --gris-texto: #4A5568; --fondo: #F5F7FA;
            --sombra: 0 8px 32px rgba(0,0,0,0.08);
            --font: 'Poppins', system-ui, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font); background: var(--fondo);
            color: #1A1D23; min-height:100vh; display:flex; flex-direction:column;
        }
        header {
            background: var(--blanco); padding:0.8rem 1.5rem;
            display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:0.8rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position:sticky; top:0; z-index:100;
        }
        .logo { display:flex; align-items:center; gap:0.5rem; font-weight:700; color:var(--azul-oscuro); }
        .logo-icon {
            width:38px; height:38px; background:linear-gradient(135deg, var(--turquesa), var(--azul-inst));
            border-radius:10px; display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:800;
        }
        .btn {
            font-family:var(--font); font-weight:600; font-size:0.85rem;
            padding:0.5rem 1.2rem; border-radius:30px; border:none;
            cursor:pointer; transition:0.25s; display:inline-flex; align-items:center; gap:0.4rem;
            background:var(--turquesa); color:#fff; border:2px solid var(--turquesa);
        }
        .btn-outline { background:transparent; color:var(--turquesa); }
        .btn-outline:hover { background:var(--turquesa); color:#fff; }
        .btn:disabled { opacity:0.5; pointer-events:none; }
        .container {
            max-width:900px; margin:1.5rem auto; padding:0 1rem;
            display:flex; flex-direction:column; gap:1.2rem; flex:1;
        }
        .chat-panel {
            background:var(--blanco); border-radius:20px; padding:1.5rem;
            box-shadow:var(--sombra); display:flex; flex-direction:column; gap:1rem;
            max-height:65vh; overflow-y:auto;
        }
        .message {
            display:flex; gap:0.8rem; align-items:flex-start;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .avatar {
            width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
            justify-content:center; font-size:1rem; flex-shrink:0;
        }
        .assistant .avatar { background:var(--turquesa); color:#fff; }
        .user .avatar { background:var(--azul-inst); color:#fff; }
        .bubble {
            background:var(--fondo); padding:0.8rem 1.2rem; border-radius:18px;
            max-width:80%; font-size:0.9rem; line-height:1.5; color:#1A1D23;
            border:1px solid var(--gris-neutro);
        }
        .user .bubble { background:var(--turquesa); color:#fff; border-color:var(--turquesa); }
        .input-area {
            display:flex; gap:0.6rem; margin-top:0.5rem;
        }
        textarea, input[type="text"] {
            font-family:var(--font); width:100%; padding:0.7rem 1rem;
            border-radius:14px; border:1.5px solid var(--gris-neutro);
            font-size:0.9rem; background:var(--blanco); resize:none;
        }
        textarea:focus, input:focus { border-color:var(--turquesa); outline:none; box-shadow:0 0 0 3px rgba(9,183,174,0.1); }
        .file-upload-area {
            border:2px dashed var(--gris-neutro); border-radius:14px;
            padding:1.2rem; text-align:center; margin:0.8rem 0; background:var(--fondo);
        }
        .file-upload-area label { cursor:pointer; color:var(--turquesa); font-weight:600; }
        .file-upload-area input[type="file"] { display:none; }
        .progress-steps {
            display:flex; gap:0.3rem; flex-wrap:wrap; margin:0.5rem 0;
        }
        .step-dot {
            width:28px; height:28px; border-radius:50%; background:var(--gris-claro);
            display:flex; align-items:center; justify-content:center;
            font-size:0.65rem; font-weight:700; color:var(--gris-texto);
        }
        .step-dot.completed { background:var(--verde); color:#fff; }
        .step-dot.active { background:var(--turquesa); color:#fff; }
        .toast {
            position:fixed; bottom:2rem; right:2rem; background:var(--azul-inst);
            color:#fff; padding:0.8rem 1.5rem; border-radius:30px; font-weight:600;
            z-index:999; opacity:0; transition:0.3s;
        }
        .toast.show { opacity:1; }
        @media (max-width:600px) {
            .bubble { max-width:90%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">PNFT</div>
            <span>Infografía Lab · Asistente Completo</span>
        </div>
        <div>
            <button class="btn btn-outline btn-sm" id="btnApiKey">🔑 Clave Gemini</button>
            <button class="btn btn-sm" id="btnReset" style="background:transparent;color:var(--gris-texto);">↺</button>
        </div>
    </header>

    <div class="container">
        <div class="progress-steps" id="stepIndicator"></div>

        <div class="chat-panel" id="chatPanel">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="bubble">
                    ¡Hola! Soy tu asistente para crear infografías curriculares PNFT.<br>
                    Voy a guiarte paso a paso por todo el proceso.<br>
                    <strong>Primero, pega tu documento</strong> (Word, PDF, PowerPoint) o <strong>carga un archivo</strong>.
                </div>
            </div>
        </div>

        <div class="input-area" id="inputArea">
            <textarea id="userInput" rows="2" placeholder="Escribe tu respuesta..."></textarea>
            <button class="btn" id="btnSend">➤</button>
        </div>

        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;" id="quickActions">
            <button class="btn btn-outline btn-sm" id="btnUploadFile">📂 Cargar archivo</button>
            <button class="btn btn-outline btn-sm" id="btnSkipStep" style="display:none;">⏭️ Saltar</button>
        </div>
        <input type="file" id="fileInput" accept=".docx,.pdf,.pptx,.txt" style="display:none;">
    </div>

    <div id="modalApi" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;">
        <div style="background:#fff;padding:2rem;border-radius:20px;max-width:400px;width:90%;">
            <h3>🔑 Clave Gemini (gratis)</h3>
            <p style="font-size:0.85rem;">Consíguela en <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a></p>
            <input type="password" id="apiKeyInput" placeholder="AIza..." style="width:100%;margin:0.5rem 0;">
            <button class="btn" id="btnSaveApi">Guardar</button>
            <button class="btn btn-outline" id="btnCancelApi">Cancelar</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            const state = {
                apiKey: localStorage.getItem('pnft_gemini_key') || '',
                engine: 'gemini',
                step: 0,
                documentText: '',
                answers: {},
            };

            // Pasos basados en el Prompt Maestro PNFT completo
            const steps = [
                { field:'document', question:'📄 Pega el documento curricular o carga un archivo (Word, PDF, PowerPoint).', help:'También puedes escribir el texto directamente.' },
                { field:'temas_principales', question:'🧩 ETAPA 1 – Comprensión: ¿Cuáles son los temas principales y secundarios del documento?', help:'Ej: Tema principal: Pensamiento Computacional. Secundarios: Algoritmos, Descomposición.' },
                { field:'informacion_clave', question:'👁️ ¿Qué información debe ver primero el lector y qué debe recordar después?', help:'Define la jerarquía visual inicial.' },
                { field:'accion_contexto', question:'⚖️ ETAPA 2 – Pesos PNFT: ¿Qué contenido requiere acción (aplicar) y cuál solo contextualiza?', help:'Peso 5 = aplicar, Peso 1 = solo contexto.' },
                { field:'arquitectura', question:'🏗️ ETAPA 3 – Arquitectura: ¿Prefieres tarjetas, columnas, línea de tiempo o diseño mixto?', help:'Describe cómo organizar la información.' },
                { field:'wireframe', question:'🧱 ETAPA 4 – Wireframe: ¿Qué orden de lectura prefieres? (izquierda→derecha, arriba→abajo)', help:'También puedes indicar tamaños relativos de bloques.' },
                { field:'reticula', question:'📐 ETAPA 5 – Retícula: ¿Usamos la estándar 12 columnas 16:9? ¿Alguna preferencia de porcentajes?', help:'Responde "estándar" o indica cambios.' },
                { field:'colores', question:'🎨 ETAPA 5.5 – Color: Además de la paleta PNFT, ¿quieres destacar algún color para alguna sección?', help:'La paleta incluye turquesa, azul, verde, morado, gris.' },
                { field:'estilo_visual', question:'🎨 ETAPA 6 – Estilo: Confirmamos tipografía Poppins, iconos 3D, ilustraciones juveniles académicas. ¿Alguna preferencia adicional?', help:'Responde "no" si estás de acuerdo.' },
                { field:'composicion', question:'🧱 ETAPA 6.2 – Composición: ¿Prefieres tarjetas redondeadas, mucho espacio en blanco, alto contraste?', help:'Describe el balance visual deseado.' },
                { field:'densidad', question:'🧠 ETAPA 6.3 – Densidad: ¿Máximo 3–5 ideas por bloque? ¿Cuál es la idea principal de cada sección?', help:'Control de carga cognitiva.' },
                { field:'auditoria', question:'🧪 ETAPA 6.5 – Auditoría: ¿Cumplimos con 16:9, Poppins, paleta, iconos 3D, no infantil? (responde "sí" o indica ajustes)', help:'Checklist visual.' },
                { field:'restricciones', question:'🚨 ETAPA 7 – Restricciones: Confirmamos no modificar, resumir ni agregar contenido. ¿Alguna restricción adicional?', help:'Responde "no" si estás de acuerdo.' },
                { field:'json', question:'🧾 ETAPA 8 – JSON: ¿Quieres generar un JSON estructurado? (responde "sí" o "no")', help:'Si respondes sí, se incluirá en la infografía final.' },
            ];

            function saveState() {
                localStorage.setItem('pnft_gemini_key', state.apiKey);
                localStorage.setItem('pnft_answers', JSON.stringify(state.answers));
                localStorage.setItem('pnft_step', state.step);
                localStorage.setItem('pnft_document', state.documentText);
            }

            function toast(msg) {
                const t = document.getElementById('toast');
                t.textContent = msg; t.className = 'toast show';
                clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
            }

            function updateStepIndicator() {
                const container = document.getElementById('stepIndicator');
                container.innerHTML = steps.map((s, i) => {
                    let cls = 'step-dot';
                    if (i < state.step) cls += ' completed';
                    else if (i === state.step) cls += ' active';
                    return `<span class="${cls}" title="${s.question}">${i+1}</span>`;
                }).join('');
            }

            function addMessage(role, text) {
                const panel = document.getElementById('chatPanel');
                const div = document.createElement('div');
                div.className = `message ${role}`;
                div.innerHTML = `<div class="avatar">${role==='assistant'?'🤖':'👤'}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
                panel.appendChild(div);
                panel.scrollTop = panel.scrollHeight;
            }

            function showQuestion(index) {
                if (index >= steps.length) {
                    addMessage('assistant','✅ ¡Completaste todas las etapas!<br>Ahora puedo generar la infografía con la IA.<br>Pulsa <strong>"Generar Infografía"</strong> o escribe "generar".');
                    document.getElementById('btnSend').textContent = '🖼️ Generar Infografía';
                    document.getElementById('btnSend').dataset.action = 'generate';
                    document.getElementById('btnSkipStep').style.display = 'none';
                    return;
                }
                const step = steps[index];
                addMessage('assistant', `<strong>${step.question}</strong><br><span style="font-size:0.8rem;color:var(--gris-texto);">${step.help||''}</span>`);
                document.getElementById('btnSend').textContent = '➤';
                document.getElementById('btnSend').dataset.action = 'answer';
                document.getElementById('btnSkipStep').style.display = 'inline-flex';
            }

            function buildMasterPrompt() {
                let p = `Actúa como arquitecto de información, diseñador editorial y especialista en infografías educativas.\n`;
                p += `Genera una infografía profesional PNFT siguiendo estrictamente este proceso:\n\n`;
                p += `📎 DOCUMENTO FUENTE:\n${state.documentText}\n\n`;
                p += `🧩 ETAPA 1 – COMPRENSIÓN:\n${state.answers['temas_principales']||''}\n`;
                p += `Información que debe verse primero y recordarse: ${state.answers['informacion_clave']||''}\n\n`;
                p += `⚖️ ETAPA 2 – JERARQUÍA Y PESOS:\n`;
                p += `Acción/aplicar (peso 5): ${state.answers['accion_contexto']||''}\n\n`;
                p += `🏗️ ETAPA 3 – ARQUITECTURA:\nPreferencia: ${state.answers['arquitectura']||'Tarjetas'}\n\n`;
                p += `🧱 ETAPA 4 – WIREFRAME:\nOrden de lectura y flujo: ${state.answers['wireframe']||'Izquierda a derecha'}\n\n`;
                p += `📐 ETAPA 5 – RETÍCULA:\n${state.answers['reticula']||'Estándar 12 columnas, 16:9'}\n\n`;
                p += `🎨 ETAPA 5.5 – SISTEMA CROMÁTICO:\nPaleta PNFT: #09B7AE, #0BD2CE, #014D6B, #0B6284, #62BDF3, #063B7F, #45258F, #9ED16F, #C9C9C9\n`;
                p += `Indicaciones adicionales: ${state.answers['colores']||'Ninguna'}\n\n`;
                p += `🎨 ETAPA 6 – SISTEMA VISUAL:\nTipografía Poppins, iconos 3D, ilustraciones juveniles académicas. ${state.answers['estilo_visual']||''}\n\n`;
                p += `🧱 ETAPA 6.2 – COMPOSICIÓN VISUAL:\n${state.answers['composicion']||'Tarjetas redondeadas, espacios amplios, alto contraste'}\n\n`;
                p += `🧠 ETAPA 6.3 – DENSIDAD COGNITIVA:\n${state.answers['densidad']||'Máximo 4 ideas por bloque, idea principal destacada'}\n\n`;
                p += `🧪 ETAPA 6.5 – AUDITORÍA VISUAL:\n${state.answers['auditoria']||'Cumple con todos los requisitos'}\n\n`;
                p += `🚨 ETAPA 7 – RESTRICCIONES:\nNo modificar, resumir ni agregar contenido. ${state.answers['restricciones']||''}\n\n`;
                if (state.answers['json'] && state.answers['json'].toLowerCase().includes('sí')) {
                    p += `🧾 ETAPA 8 – JSON:\nGenerar también un JSON estructurado con la información.\n\n`;
                }
                p += `🖼️ ETAPA 9 – INFOGRAFÍA FINAL:\nGenera la infografía final con fidelidad 100%, formato 16:9, paleta PNFT, Poppins, iconos 3D, estilo educativo profesional secundaria.\n`;
                p += `Respeta todas las restricciones y la arquitectura definida.`;
                return p;
            }

            async function callGemini(prompt) {
                if (!state.apiKey || !state.apiKey.startsWith('AIza')) throw new Error('Clave Gemini no configurada.');
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.apiKey}`, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({
                        contents:[{parts:[{text:prompt}]}],
                        generationConfig:{temperature:0.4, maxOutputTokens:3000}
                    })
                });
                if (!res.ok) {
                    const err = await res.json().catch(()=>({}));
                    throw new Error(err.error?.message || 'Error '+res.status);
                }
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            }

            async function generateInfographic() {
                const masterPrompt = buildMasterPrompt();
                addMessage('assistant', '⏳ Generando infografía con IA...');
                try {
                    let result;
                    if (state.engine === 'gemini') {
                        result = await callGemini(masterPrompt);
                    } else {
                        navigator.clipboard.writeText(masterPrompt);
                        result = '📋 Prompt maestro copiado. Pégalo en ChatGPT o Gemini.\n\n--- PROMPT ---\n' + masterPrompt;
                    }
                    addMessage('assistant', '🎉 ¡Infografía lista!\n\n' + result);
                    document.getElementById('btnSend').textContent = '🔄 Nueva infografía';
                    document.getElementById('btnSend').dataset.action = 'reset';
                } catch (e) {
                    addMessage('assistant', '❌ Error: ' + e.message + '\n\nPrompt copiado como respaldo.');
                    navigator.clipboard.writeText(masterPrompt);
                    toast('Prompt copiado');
                }
            }

            async function handleSend() {
                const input = document.getElementById('userInput');
                const text = input.value.trim();
                const action = document.getElementById('btnSend').dataset.action;

                if (action === 'generate') { await generateInfographic(); return; }
                if (action === 'reset') {
                    state.step = 0; state.answers = {}; state.documentText = '';
                    document.getElementById('chatPanel').innerHTML = '';
                    document.getElementById('btnSend').dataset.action = 'answer';
                    document.getElementById('btnSend').textContent = '➤';
                    showQuestion(0); updateStepIndicator(); saveState();
                    return;
                }
                if (!text) return;

                addMessage('user', text);
                if (state.step < steps.length) {
                    const field = steps[state.step].field;
                    if (field === 'document') state.documentText = text;
                    else state.answers[field] = text;
                    state.step++;
                    saveState(); updateStepIndicator();
                }
                input.value = '';
                showQuestion(state.step < steps.length ? state.step : state.step);
            }

            document.getElementById('btnSend').addEventListener('click', handleSend);
            document.getElementById('userInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
            });
            document.getElementById('btnSkipStep').addEventListener('click', () => {
                if (state.step < steps.length) {
                    state.answers[steps[state.step].field] = 'No especificado';
                    state.step++; updateStepIndicator();
                    showQuestion(state.step < steps.length ? state.step : state.step);
                }
            });
            document.getElementById('btnUploadFile').addEventListener('click', () => document.getElementById('fileInput').click());
            document.getElementById('fileInput').addEventListener('change', async (e) => {
                const file = e.target.files[0]; if (!file) return;
                toast('⏳ Extrayendo texto...');
                try {
                    let text = ''; const ext = file.name.split('.').pop().toLowerCase();
                    if (ext === 'txt') text = await file.text();
                    else if (ext === 'docx') {
                        const buf = await file.arrayBuffer();
                        text = (await mammoth.extractRawText({arrayBuffer: buf})).value;
                    } else if (ext === 'pdf') {
                        const buf = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({data: buf}).promise;
                        for (let i=1; i<=pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map(it=>it.str).join(' ')+'\n';
                        }
                    } else if (ext === 'pptx') {
                        const buf = await file.arrayBuffer();
                        const json = pptx2json(buf);
                        json.slides.forEach(s => { s.texts.forEach(t => text += t+'\n'); });
                    } else throw new Error('Formato no soportado');
                    document.getElementById('userInput').value = text;
                    toast('✅ Texto extraído. Envíalo ahora.');
                } catch (err) { toast('❌ '+err.message); }
            });

            document.getElementById('btnApiKey').addEventListener('click', () => {
                document.getElementById('apiKeyInput').value = state.apiKey;
                document.getElementById('modalApi').style.display = 'flex';
            });
            document.getElementById('btnCancelApi').addEventListener('click', () => document.getElementById('modalApi').style.display = 'none');
            document.getElementById('btnSaveApi').addEventListener('click', () => {
                state.apiKey = document.getElementById('apiKeyInput').value.trim();
                saveState(); document.getElementById('modalApi').style.display = 'none';
                toast('🔑 Clave guardada');
            });
            document.getElementById('btnReset').addEventListener('click', () => {
                if (confirm('¿Reiniciar toda la conversación?')) {
                    state.step=0; state.answers={}; state.documentText='';
                    document.getElementById('chatPanel').innerHTML = '';
                    document.getElementById('btnSend').dataset.action = 'answer';
                    document.getElementById('btnSend').textContent = '➤';
                    showQuestion(0); updateStepIndicator(); saveState();
                }
            });

            // Inicializar
            const savedStep = localStorage.getItem('pnft_step');
            if (savedStep) state.step = parseInt(savedStep);
            const savedAnswers = localStorage.getItem('pnft_answers');
            if (savedAnswers) state.answers = JSON.parse(savedAnswers);
            state.documentText = localStorage.getItem('pnft_document') || '';
            updateStepIndicator();
            if (state.step === 0) showQuestion(0);
            else {
                // Reconstruir mensajes previos
                for (let i=0; i<state.step; i++) {
                    const step = steps[i];
                    if (step.field === 'document') addMessage('user', state.documentText.substring(0,150)+'...');
                    else addMessage('user', state.answers[step.field] || '');
                }
                showQuestion(state.step);
            }
        })();
    </script>
</body>
</html>
