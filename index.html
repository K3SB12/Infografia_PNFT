<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNFT Infografía Lab · Asistente Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://unpkg.com/pptx2json@0.0.7/dist/pptx2json.min.js"></script>
    <style>
        :root {
            --turquesa: #09B7AE; --azul-oscuro: #014D6B; --azul-inst: #063B7F;
            --verde: #9ED16F; --gris-neutro: #C9C9C9; --gris-claro: #E8ECF1;
            --blanco: #FFFFFF; --gris-texto: #4A5568; --fondo: #F5F7FA;
            --sombra: 0 8px 32px rgba(0,0,0,0.08);
            --font: 'Poppins', system-ui, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font); background: var(--fondo);
            color: #1A1D23; min-height:100vh; display:flex; flex-direction:column;
        }
        header {
            background: var(--blanco); padding:0.8rem 1.5rem;
            display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:0.8rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position:sticky; top:0; z-index:100;
        }
        .logo { display:flex; align-items:center; gap:0.5rem; font-weight:700; color:var(--azul-oscuro); }
        .logo-icon {
            width:38px; height:38px; background:linear-gradient(135deg, var(--turquesa), var(--azul-inst));
            border-radius:10px; display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:800;
        }
        .btn {
            font-family:var(--font); font-weight:600; font-size:0.85rem;
            padding:0.5rem 1.2rem; border-radius:30px; border:none;
            cursor:pointer; transition:0.25s; display:inline-flex; align-items:center; gap:0.4rem;
            background:var(--turquesa); color:#fff; border:2px solid var(--turquesa);
        }
        .btn-outline { background:transparent; color:var(--turquesa); }
        .btn-outline:hover { background:var(--turquesa); color:#fff; }
        .btn:disabled { opacity:0.5; pointer-events:none; }
        .container {
            max-width:900px; margin:1.5rem auto; padding:0 1rem;
            display:flex; flex-direction:column; gap:1.2rem; flex:1;
        }
        .chat-panel {
            background:var(--blanco); border-radius:20px; padding:1.5rem;
            box-shadow:var(--sombra); display:flex; flex-direction:column; gap:1rem;
            max-height:65vh; overflow-y:auto;
        }
        .message { display:flex; gap:0.8rem; align-items:flex-start; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .avatar {
            width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
            justify-content:center; font-size:1rem; flex-shrink:0;
        }
        .assistant .avatar { background:var(--turquesa); color:#fff; }
        .user .avatar { background:var(--azul-inst); color:#fff; }
        .bubble {
            background:var(--fondo); padding:0.8rem 1.2rem; border-radius:18px;
            max-width:80%; font-size:0.9rem; line-height:1.5; color:#1A1D23;
            border:1px solid var(--gris-neutro);
        }
        .user .bubble { background:var(--turquesa); color:#fff; border-color:var(--turquesa); }
        .suggestion-card {
            background:var(--blanco); border:1px solid var(--gris-neutro);
            border-radius:12px; padding:0.8rem; margin:0.4rem 0;
            display:flex; align-items:center; justify-content:space-between;
            gap:0.8rem; flex-wrap:wrap;
        }
        .suggestion-card .content { flex:1; font-size:0.85rem; }
        .suggestion-card .actions { display:flex; gap:0.4rem; }
        .input-area { display:flex; gap:0.6rem; margin-top:0.5rem; }
        textarea, input[type="text"] {
            font-family:var(--font); width:100%; padding:0.7rem 1rem;
            border-radius:14px; border:1.5px solid var(--gris-neutro);
            font-size:0.9rem; background:var(--blanco); resize:none;
        }
        textarea:focus, input:focus { border-color:var(--turquesa); outline:none; box-shadow:0 0 0 3px rgba(9,183,174,0.1); }
        .progress-steps { display:flex; gap:0.3rem; flex-wrap:wrap; margin:0.5rem 0; }
        .step-dot {
            width:28px; height:28px; border-radius:50%; background:var(--gris-claro);
            display:flex; align-items:center; justify-content:center;
            font-size:0.65rem; font-weight:700; color:var(--gris-texto);
        }
        .step-dot.completed { background:var(--verde); color:#fff; }
        .step-dot.active { background:var(--turquesa); color:#fff; }
        .toast {
            position:fixed; bottom:2rem; right:2rem; background:var(--azul-inst);
            color:#fff; padding:0.8rem 1.5rem; border-radius:30px; font-weight:600;
            z-index:999; opacity:0; transition:0.3s;
        }
        .toast.show { opacity:1; }
        @media (max-width:600px) {
            .bubble { max-width:90%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">PNFT</div>
            <span>Infografía Lab · Asistente Inteligente</span>
        </div>
        <div>
            <button class="btn btn-outline btn-sm" id="btnApiKey">🔑 Clave Gemini</button>
            <button class="btn btn-sm" id="btnReset" style="background:transparent;color:var(--gris-texto);">↺</button>
        </div>
    </header>

    <div class="container">
        <div class="progress-steps" id="stepIndicator"></div>

        <div class="chat-panel" id="chatPanel">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="bubble">
                    ¡Hola! Soy tu asistente para crear infografías curriculares PNFT.<br>
                    <strong>Pega tu documento</strong> (Word, PDF, PowerPoint) o <strong>carga un archivo</strong>.
                </div>
            </div>
        </div>

        <div class="input-area" id="inputArea">
            <textarea id="userInput" rows="2" placeholder="Escribe tu respuesta..."></textarea>
            <button class="btn" id="btnSend">➤</button>
        </div>

        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;" id="quickActions">
            <button class="btn btn-outline btn-sm" id="btnUploadFile">📂 Cargar archivo</button>
            <button class="btn btn-outline btn-sm" id="btnSkipStep" style="display:none;">⏭️ Saltar</button>
        </div>
        <input type="file" id="fileInput" accept=".docx,.pdf,.pptx,.txt" style="display:none;">
    </div>

    <div id="modalApi" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;">
        <div style="background:#fff;padding:2rem;border-radius:20px;max-width:400px;width:90%;">
            <h3>🔑 Clave Gemini (gratis)</h3>
            <p style="font-size:0.85rem;">Consíguela en <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a></p>
            <input type="password" id="apiKeyInput" placeholder="AIza..." style="width:100%;margin:0.5rem 0;">
            <button class="btn" id="btnSaveApi">Guardar</button>
            <button class="btn btn-outline" id="btnCancelApi">Cancelar</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            const state = {
                apiKey: localStorage.getItem('pnft_gemini_key') || '',
                engine: 'gemini',
                step: 0,
                documentText: '',
                answers: {},
                waitingForSuggestion: false,
            };

            // Definición de etapas con prompts para análisis automático (piden JSON)
            const steps = [
                {
                    field: 'document',
                    question: '📄 Pega el documento curricular o carga un archivo (Word, PDF, PowerPoint).',
                    help: 'También puedes escribir el texto directamente.',
                    analysisPrompt: null,
                },
                {
                    field: 'comprension',
                    question: '🧩 ETAPA 1 – Comprensión del contenido',
                    help: 'La IA analizará el documento y te mostrará sugerencias.',
                    analysisPrompt: 'Analiza el siguiente documento curricular. Devuelve UNICAMENTE un JSON con este formato: {"temas_principales": ["tema1", "tema2"], "temas_secundarios": ["sec1", "sec2"], "informacion_clave": {"primero": "lo que debe verse primero", "recordar": "lo que debe recordarse"}, "accion": "lo que requiere acción", "contexto": "lo que solo contextualiza"}. No incluyas texto adicional.',
                },
                {
                    field: 'jerarquia',
                    question: '⚖️ ETAPA 2 – Jerarquía y Pesos PNFT',
                    help: 'Se clasificarán los contenidos según la escala PNFT.',
                    analysisPrompt: 'Utiliza el análisis previo y el documento. Clasifica cada sección según la escala PNFT (1=contexto, 3=comprensión, 5=aplicación/recuerdo). Devuelve UNICAMENTE un JSON con el formato: {"jerarquia": [{"seccion": "nombre", "peso": 1 o 3 o 5, "justificacion": "razón"}]}. No incluyas texto adicional.',
                },
                {
                    field: 'arquitectura',
                    question: '🏗️ ETAPA 3 – Arquitectura de Información',
                    help: 'Se generarán 3 propuestas con diagramas ASCII.',
                    analysisPrompt: 'Basado en el documento y análisis previo, genera 3 propuestas de arquitectura visual. Devuelve UNICAMENTE un JSON con el formato: {"propuestas": [{"nombre": "Propuesta 1", "ventajas": "...", "desventajas": "...", "tipo_lectura": "...", "diagrama_ascii": "..."}]}. No incluyas texto adicional.',
                },
                {
                    field: 'wireframe',
                    question: '🧱 ETAPA 4 – Wireframe',
                    help: 'Se convertirá la arquitectura seleccionada en wireframe.',
                    analysisPrompt: 'Convierte la arquitectura seleccionada (primera propuesta) en wireframe. Devuelve UNICAMENTE un JSON con el formato: {"wireframe": "diagrama ascii", "orden_lectura": "...", "jerarquia_visual": "...", "tamano_bloques": "..."}. No incluyas texto adicional.',
                },
                {
                    field: 'reticula_color',
                    question: '📐 ETAPA 5 – Retícula + Sistema Cromático',
                    help: 'Se definirá retícula y uso pedagógico del color.',
                    analysisPrompt: 'Define la retícula PNFT estándar 12 columnas 16:9 y el sistema cromático. Paleta: #09B7AE, #0BD2CE, #014D6B, #0B6284, #62BDF3, #063B7F, #45258F, #9ED16F, #C9C9C9. Devuelve UNICAMENTE un JSON: {"reticula": "descripción", "codificacion_color": {"area1": "color", ...}}. No incluyas texto adicional.',
                },
                {
                    field: 'sistema_visual',
                    question: '🎨 ETAPA 6 – Sistema de Diseño Visual',
                    help: 'Se confirmará tipografía, iconos 3D, ilustraciones.',
                    analysisPrompt: 'Confirma el sistema visual PNFT: tipografía Poppins, iconos 3D semi realistas, ilustraciones adolescentes 16-18 años, estilo académico. Devuelve UNICAMENTE un JSON: {"confirmacion": "sí", "detalles": "..."}. No incluyas texto adicional.',
                },
                {
                    field: 'composicion',
                    question: '🧱 ETAPA 6.2 – Composición Visual',
                    help: 'Se definirá distribución de bloques y espacios.',
                    analysisPrompt: 'Define composición visual: distribución, espacios en blanco, equilibrio texto/imagen. Devuelve UNICAMENTE un JSON: {"composicion": "descripción", "lectura_rapida": "≤10s por bloque"}. No incluyas texto adicional.',
                },
                {
                    field: 'densidad',
                    question: '🧠 ETAPA 6.3 – Densidad Cognitiva',
                    help: 'Se controlará la carga de ideas por bloque.',
                    analysisPrompt: 'Para cada bloque, define máximo 3-5 ideas, idea principal, secundarias y nivel de complejidad. Devuelve UNICAMENTE un JSON: {"bloques": [{"nombre": "bloque1", "ideas": ["idea1"], "principal": "...", "complejidad": "baja/media/alta"}]}. No incluyas texto adicional.',
                },
                {
                    field: 'auditoria',
                    question: '🧪 ETAPA 6.5 – Auditoría Visual',
                    help: 'Se verificará cumplimiento de requisitos.',
                    analysisPrompt: 'Verifica cumplimiento: 16:9, Poppins, paleta, iconos 3D, no infantil, etc. Devuelve UNICAMENTE un JSON: {"cumplimiento": [{"item": "...", "estado": "✅/❌"}]}. No incluyas texto adicional.',
                },
                {
                    field: 'restricciones',
                    question: '🚨 ETAPA 7 – Restricciones de Producción',
                    help: 'Se confirmarán las prohibiciones y obligaciones.',
                    analysisPrompt: 'Confirma las restricciones: no modificar, no resumir, no infantil, etc. Devuelve UNICAMENTE un JSON: {"confirmacion": "sí", "observaciones": "..."}. No incluyas texto adicional.',
                },
                {
                    field: 'json_final',
                    question: '🧾 ETAPA 8 – Generación de JSON',
                    help: '¿Generar JSON final estructurado? (responde "sí" o "no")',
                    analysisPrompt: null, // se maneja con respuesta directa
                },
            ];

            function saveState() {
                localStorage.setItem('pnft_gemini_key', state.apiKey);
                localStorage.setItem('pnft_answers', JSON.stringify(state.answers));
                localStorage.setItem('pnft_step', state.step);
                localStorage.setItem('pnft_document', state.documentText);
            }

            function toast(msg) {
                const t = document.getElementById('toast');
                t.textContent = msg; t.className = 'toast show';
                clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
            }

            function updateStepIndicator() {
                const container = document.getElementById('stepIndicator');
                container.innerHTML = steps.map((s, i) => {
                    let cls = 'step-dot';
                    if (i < state.step) cls += ' completed';
                    else if (i === state.step) cls += ' active';
                    return `<span class="${cls}" title="${s.question}">${i+1}</span>`;
                }).join('');
            }

            function addMessage(role, text, extraHTML = '') {
                const panel = document.getElementById('chatPanel');
                const div = document.createElement('div');
                div.className = `message ${role}`;
                div.innerHTML = `<div class="avatar">${role==='assistant'?'🤖':'👤'}</div><div class="bubble">${text.replace(/\n/g,'<br>')}${extraHTML}</div>`;
                panel.appendChild(div);
                panel.scrollTop = panel.scrollHeight;
            }

            function showSuggestionCards(jsonData, field) {
                // Convierte el JSON en tarjetas de sugerencias editables
                const container = document.getElementById('chatPanel');
                const cardDiv = document.createElement('div');
                cardDiv.className = 'message assistant';
                let html = '<div class="avatar">🤖</div><div class="bubble"><strong>Sugerencias de la IA:</strong><br>';

                if (field === 'comprension') {
                    html += `<strong>Temas principales:</strong> ${jsonData.temas_principales.join(', ')}<br>`;
                    html += `<strong>Secundarios:</strong> ${jsonData.temas_secundarios.join(', ')}<br>`;
                    html += `<strong>Primero:</strong> ${jsonData.informacion_clave.primero}<br>`;
                    html += `<strong>Recordar:</strong> ${jsonData.informacion_clave.recordar}<br>`;
                } else if (field === 'jerarquia') {
                    jsonData.jerarquia.forEach(item => {
                        html += `<div class="suggestion-card"><span class="content">${item.seccion} (Peso ${item.peso})</span><span>${item.justificacion}</span></div>`;
                    });
                } else {
                    // Genérico: mostrar como texto
                    html += `<pre style="font-size:0.8rem;">${JSON.stringify(jsonData, null, 2)}</pre>`;
                }

                html += `<div style="margin-top:0.8rem;display:flex;gap:0.5rem;">
                    <button class="btn btn-sm accept-suggestion">✅ Usar esta sugerencia</button>
                    <button class="btn btn-outline btn-sm edit-suggestion">✏️ Editar</button>
                </div></div>`;
                cardDiv.innerHTML = html;
                container.appendChild(cardDiv);
                container.scrollTop = container.scrollHeight;

                // Eventos
                const acceptBtn = cardDiv.querySelector('.accept-suggestion');
                const editBtn = cardDiv.querySelector('.edit-suggestion');
                acceptBtn.addEventListener('click', () => {
                    state.answers[field] = JSON.stringify(jsonData);
                    state.step++;
                    saveState(); updateStepIndicator();
                    cardDiv.remove();
                    showQuestion(state.step);
                });
                editBtn.addEventListener('click', () => {
                    // Mostrar textarea para editar
                    const textarea = document.createElement('textarea');
                    textarea.value = JSON.stringify(jsonData, null, 2);
                    textarea.rows = 4;
                    cardDiv.querySelector('.bubble').appendChild(textarea);
                    const saveBtn = document.createElement('button');
                    saveBtn.textContent = 'Guardar cambios';
                    saveBtn.className = 'btn btn-sm';
                    saveBtn.addEventListener('click', () => {
                        try {
                            const newData = JSON.parse(textarea.value);
                            state.answers[field] = JSON.stringify(newData);
                            state.step++;
                            saveState(); updateStepIndicator();
                            cardDiv.remove();
                            showQuestion(state.step);
                        } catch (e) { toast('JSON inválido'); }
                    });
                    cardDiv.querySelector('.bubble').appendChild(saveBtn);
                    acceptBtn.disabled = true;
                    editBtn.disabled = true;
                });
            }

            async function performAnalysis(field) {
                const step = steps[state.step];
                if (!step.analysisPrompt) return;
                const prompt = step.analysisPrompt + '\n\nDocumento:\n' + state.documentText + '\n\nAnálisis previo:\n' + JSON.stringify(state.answers);
                addMessage('assistant', '⏳ Analizando documento...');
                try {
                    let result;
                    if (state.engine === 'gemini' && state.apiKey) {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.apiKey}`, {
                            method:'POST',
                            headers:{'Content-Type':'application/json'},
                            body: JSON.stringify({
                                contents:[{parts:[{text:prompt}]}],
                                generationConfig:{temperature:0.2, maxOutputTokens:2000}
                            })
                        });
                        if (!res.ok) throw new Error((await res.json()).error?.message || 'Error');
                        const data = await res.json();
                        result = data.candidates[0].content.parts[0].text;
                    } else {
                        navigator.clipboard.writeText(prompt);
                        toast('Prompt copiado. Pega la respuesta JSON aquí.');
                        result = await new Promise(resolve => {
                            const input = document.getElementById('userInput');
                            input.placeholder = 'Pega aquí el JSON de la IA...';
                            input.focus();
                            const origHandler = document.getElementById('btnSend').onclick;
                            document.getElementById('btnSend').onclick = () => {
                                resolve(input.value.trim());
                                input.placeholder = 'Escribe tu respuesta...';
                                document.getElementById('btnSend').onclick = origHandler;
                            };
                        });
                    }
                    // Limpiar mensaje "analizando"
                    const msgs = document.querySelectorAll('.bubble');
                    msgs[msgs.length-1].parentElement.remove();
                    // Parsear JSON
                    const jsonData = JSON.parse(result.replace(/```json|```/g, ''));
                    showSuggestionCards(jsonData, field);
                    state.waitingForSuggestion = true;
                } catch (e) {
                    toast('Error: ' + e.message);
                    // Si falla, permitir entrada manual
                    showQuestion(state.step);
                }
            }

            function showQuestion(index) {
                if (index >= steps.length) {
                    addMessage('assistant','✅ ¡Completaste todas las etapas!<br>Ahora puedo generar la infografía con la IA.<br>Pulsa <strong>"Generar Infografía"</strong>.');
                    document.getElementById('btnSend').textContent = '🖼️ Generar Infografía';
                    document.getElementById('btnSend').dataset.action = 'generate';
                    document.getElementById('btnSkipStep').style.display = 'none';
                    return;
                }
                const step = steps[index];
                addMessage('assistant', `<strong>${step.question}</strong><br><span style="font-size:0.8rem;">${step.help||''}</span>`);
                document.getElementById('btnSend').textContent = '➤';
                document.getElementById('btnSend').dataset.action = 'answer';
                document.getElementById('btnSkipStep').style.display = 'inline-flex';

                // Si la etapa tiene análisis automático, ejecutarlo
                if (step.analysisPrompt && state.documentText && !state.answers[step.field]) {
                    performAnalysis(step.field);
                }
            }

            function buildMasterPrompt() {
                let p = `Actúa como arquitecto de información, diseñador editorial y especialista en infografías educativas.\n`;
                p += `Genera una infografía profesional PNFT siguiendo estrictamente este proceso:\n\n`;
                p += `📎 DOCUMENTO FUENTE:\n${state.documentText}\n\n`;
                for (let key in state.answers) {
                    p += `📌 ${key}: ${state.answers[key]}\n`;
                }
                p += `\n🖼️ ETAPA 9 – INFOGRAFÍA FINAL:\nGenera la infografía final con fidelidad 100%, formato 16:9, paleta PNFT, Poppins, iconos 3D, estilo educativo profesional secundaria.`;
                return p;
            }

            async function generateInfographic() {
                const masterPrompt = buildMasterPrompt();
                addMessage('assistant', '⏳ Generando infografía...');
                try {
                    let result;
                    if (state.engine === 'gemini' && state.apiKey) {
                        result = await callGemini(masterPrompt);
                    } else {
                        navigator.clipboard.writeText(masterPrompt);
                        result = '📋 Prompt maestro copiado. Pégalo en ChatGPT o Gemini.';
                    }
                    addMessage('assistant', '🎉 ¡Infografía lista!\n\n' + result);
                    document.getElementById('btnSend').textContent = '🔄 Nueva infografía';
                    document.getElementById('btnSend').dataset.action = 'reset';
                } catch (e) {
                    addMessage('assistant', '❌ Error: ' + e.message);
                    navigator.clipboard.writeText(masterPrompt);
                }
            }

            async function callGemini(prompt) {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.apiKey}`, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({
                        contents:[{parts:[{text:prompt}]}],
                        generationConfig:{temperature:0.4, maxOutputTokens:3000}
                    })
                });
                if (!res.ok) throw new Error((await res.json()).error?.message);
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            }

            async function handleSend() {
                const input = document.getElementById('userInput');
                const text = input.value.trim();
                const action = document.getElementById('btnSend').dataset.action;

                if (action === 'generate') { await generateInfographic(); return; }
                if (action === 'reset') {
                    state.step = 0; state.answers = {}; state.documentText = '';
                    document.getElementById('chatPanel').innerHTML = '';
                    document.getElementById('btnSend').dataset.action = 'answer';
                    document.getElementById('btnSend').textContent = '➤';
                    showQuestion(0); updateStepIndicator(); saveState();
                    return;
                }
                if (!text) return;

                if (state.step < steps.length && !state.waitingForSuggestion) {
                    const field = steps[state.step].field;
                    if (field === 'document') {
                        state.documentText = text;
                        addMessage('user', '📄 Documento cargado (' + text.length + ' caracteres)');
                        addMessage('assistant', '✅ Documento guardado. Iniciando análisis...');
                        state.step++;
                        saveState(); updateStepIndicator();
                        showQuestion(state.step);
                    } else {
                        // Respuesta manual
                        addMessage('user', text);
                        state.answers[field] = text;
                        state.step++;
                        saveState(); updateStepIndicator();
                        showQuestion(state.step);
                    }
                }
                input.value = '';
                state.waitingForSuggestion = false;
            }

            document.getElementById('btnSend').addEventListener('click', handleSend);
            document.getElementById('userInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
            });
            document.getElementById('btnSkipStep').addEventListener('click', () => {
                if (state.step < steps.length) {
                    state.answers[steps[state.step].field] = 'No especificado';
                    state.step++; updateStepIndicator();
                    showQuestion(state.step);
                }
            });
            document.getElementById('btnUploadFile').addEventListener('click', () => document.getElementById('fileInput').click());
            document.getElementById('fileInput').addEventListener('change', async (e) => {
                const file = e.target.files[0]; if (!file) return;
                toast('⏳ Extrayendo texto...');
                try {
                    let text = ''; const ext = file.name.split('.').pop().toLowerCase();
                    if (ext === 'txt') text = await file.text();
                    else if (ext === 'docx') {
                        const buf = await file.arrayBuffer();
                        text = (await mammoth.extractRawText({arrayBuffer: buf})).value;
                    } else if (ext === 'pdf') {
                        const buf = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({data: buf}).promise;
                        for (let i=1; i<=pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map(it=>it.str).join(' ')+'\n';
                        }
                    } else if (ext === 'pptx') {
                        const buf = await file.arrayBuffer();
                        const json = pptx2json(buf);
                        json.slides.forEach(s => { s.texts.forEach(t => text += t+'\n'); });
                    } else throw new Error('Formato no soportado');
                    document.getElementById('userInput').value = text;
                    toast('✅ Texto extraído. Envíalo ahora.');
                } catch (err) { toast('❌ '+err.message); }
            });

            document.getElementById('btnApiKey').addEventListener('click', () => {
                document.getElementById('apiKeyInput').value = state.apiKey;
                document.getElementById('modalApi').style.display = 'flex';
            });
            document.getElementById('btnCancelApi').addEventListener('click', () => document.getElementById('modalApi').style.display = 'none');
            document.getElementById('btnSaveApi').addEventListener('click', () => {
                state.apiKey = document.getElementById('apiKeyInput').value.trim();
                saveState(); document.getElementById('modalApi').style.display = 'none';
                toast('🔑 Clave guardada');
            });
            document.getElementById('btnReset').addEventListener('click', () => {
                if (confirm('¿Reiniciar?')) {
                    state.step=0; state.answers={}; state.documentText='';
                    document.getElementById('chatPanel').innerHTML = '';
                    document.getElementById('btnSend').dataset.action = 'answer';
                    document.getElementById('btnSend').textContent = '➤';
                    showQuestion(0); updateStepIndicator(); saveState();
                }
            });

            // Inicializar
            const savedStep = localStorage.getItem('pnft_step');
            if (savedStep) state.step = parseInt(savedStep);
            const savedAnswers = localStorage.getItem('pnft_answers');
            if (savedAnswers) state.answers = JSON.parse(savedAnswers);
            state.documentText = localStorage.getItem('pnft_document') || '';
            updateStepIndicator();
            if (state.step === 0) showQuestion(0);
            else {
                for (let i=0; i<state.step; i++) {
                    const step = steps[i];
                    if (step.field === 'document') {
                        addMessage('user', '📄 Documento cargado');
                    } else if (state.answers[step.field]) {
                        addMessage('user', state.answers[step.field].substring(0, 100)+'...');
                    }
                }
                showQuestion(state.step);
            }
        })();
    </script>
</body>
</html>
